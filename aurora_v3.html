        lore: 'The gods were once a mortal civilization that ascended collectively — an entire race that burned their home world down in the process. They searched the void for a new world and found Aurora: a planet so incomprehensibly massive they could not navigate around it. They stopped. They stayed.\n\nAurora rejected their true forms on contact. So the gods did the only thing left: they experimented. First they created the Lesser Beings — humans, dwarves, elves, and hundreds of other mortal races. Then the Superior Beings: demigods, angels, spirits — more ambitious creations with their own agendas. Then came the true cost. To descend personally, a god must tear a piece of their own soul free and compress it into a mortal vessel of their own design. Every vessel is unique. These are the Divine Races — gods wearing bodies they designed themselves.\n\nThe vessel is permanent. A god cannot reclaim the soul fragment once given. If the vessel dies, that piece of soul is lost forever — the god above grows weaker. Enough deaths and the diminishment becomes corruption. They gave the condition a name: Demon. Not a creature. A state.\n\nNow millions of divine vessels walk among the lesser beings, living mortal lives. A god of war runs a bakery. A god of storms tends a lighthouse alone. They have no cosmic duties here. They are simply alive, in small bodies, on an incomprehensible planet, trying to figure out what that means.',

// ── INVENTORY & SHOP & DEATH ENGINE ─────────────────────────────────────────
var MAX_SLOTS = 20;
var ITEM_RARITIES = { common:'#9ca3af', uncommon:'#4ade80', rare:'#60a5fa', epic:'#a855f7', legendary:'#f59e0b' };

function getInventory() {
  var c = state.currentChar;
  if (!c) return [];
  if (!c.inventoryItems) {
    c.inventoryItems = (c.inventory || 'Torch, basic supplies').split(',').map(function(s, i) {
      return { id: i, name: s.trim(), qty: 1, rarity: 'common', type: 'misc', effect: '', equipped: false, value: 2 };
    });
  }
  return c.inventoryItems;
}

function addItemToInventory(item) {
  var c = state.currentChar;
  if (!c) return false;
  var inv = getInventory();
  if (inv.length >= MAX_SLOTS) return false;
  var existing = inv.find(function(i) { return i.name.toLowerCase() === (item.name||'').toLowerCase(); });
  if (existing) { existing.qty = (existing.qty || 1) + 1; }
  else { inv.push(Object.assign({ id: Date.now() + Math.random(), qty: 1, rarity: 'common', type: 'misc', effect: '', equipped: false, value: 2 }, item)); }
  c.inventoryItems = inv;
  save();
  return true;
}

function removeItemFromInventory(itemId) {
  var c = state.currentChar;
  if (!c) return;
  var inv = getInventory();
  var idx = inv.findIndex(function(i) { return String(i.id) === String(itemId); });
  if (idx === -1) return;
  if (inv[idx].qty > 1) { inv[idx].qty--; }
  else { inv.splice(idx, 1); }
  c.inventoryItems = inv;
  save();
}

function toggleEquip(itemId) {
  var inv = getInventory();
  var item = inv.find(function(i) { return String(i.id) === String(itemId); });
  if (item) { item.equipped = !item.equipped; save(); }
}

async function generateLoot(context) {
  var c = state.currentChar, w = state.currentWorld;
  var inv = getInventory();
  if (inv.length >= MAX_SLOTS) {
    state.lootToast = { text: 'Inventory full! Drop something first.', items: [] };
    setTimeout(function(){ state.lootToast = null; render(); }, 3000);
    render(); return;
  }
  var slotsLeft = MAX_SLOTS - inv.length;
  var sys = 'You are a loot generator for a narrative RPG. Return ONLY a valid JSON array of 1-2 item objects.';
  var prompt = 'World: ' + (w ? w.name + ' (' + w.setting + ', magic: ' + w.magic_level + ')' : 'unknown') + '. Character: ' + (c ? c.name + ' (' + c.class + ' lv.' + c.level + ')' : 'unknown') + '. Context: ' + context + '. Generate 1-' + Math.min(2, slotsLeft) + ' contextually appropriate items. Each: {"name":string,"rarity":"common|uncommon|rare|epic|legendary","type":"weapon|armor|consumable|tool|misc|material","effect":"brief effect","value":gold_number}. Match the world setting. Return ONLY the JSON array, no other text.';
  try {
    var raw = await callAI(sys, prompt, 300);
    var cleaned = raw.replace(/```json[\r\n]*/g,'').replace(/```[\r\n]*/g,'').trim();
    var s = cleaned.indexOf('['), e = cleaned.lastIndexOf(']');
    if (s !== -1 && e !== -1) cleaned = cleaned.slice(s, e+1);
    var items = JSON.parse(cleaned);
    if (!Array.isArray(items)) items = [items];
    items.forEach(function(item) { addItemToInventory(item); });
    state.lootToast = { text: 'You found something!', items: items };
  } catch(err) {
    var fallback = { name: 'Strange Relic', qty: 1, rarity: 'uncommon', type: 'misc', effect: 'Unknown purpose', value: 5 };
    addItemToInventory(fallback);
    state.lootToast = { text: 'You found something!', items: [fallback] };
  }
  setTimeout(function(){ state.lootToast = null; render(); }, 4000);
  render();
}

async function generateShop(type) {
  state.shopLoading = true; state.showShop = true; render();
  var c = state.currentChar, w = state.currentWorld;
  var sys = 'You are a shop inventory generator for a narrative RPG. Return ONLY a valid JSON array of exactly 6 items.';
  var prompt = 'World: ' + (w ? w.name + ' (' + w.setting + ', magic: ' + w.magic_level + ', tech: ' + w.technology_level + ')' : 'unknown') + '. Character: ' + (c ? c.name + ' (' + c.class + ' lv.' + c.level + ')' : 'unknown') + '. Player gold: ' + (state.gold||0) + '. Shop type: ' + (type||'general') + '. Generate exactly 6 items for sale. Each: {"name":string,"rarity":"common|uncommon|rare","type":"weapon|armor|consumable|tool|misc","effect":"brief description","value":price_1_to_50}. Return ONLY the JSON array.';
  try {
    var raw = await callAI(sys, prompt, 400);
    var cleaned = raw.replace(/```json[\r\n]*/g,'').replace(/```[\r\n]*/g,'').trim();
    var s = cleaned.indexOf('['), e = cleaned.lastIndexOf(']');
    if (s !== -1 && e !== -1) cleaned = cleaned.slice(s, e+1);
    state.shopItems = JSON.parse(cleaned);
    if (!Array.isArray(state.shopItems)) state.shopItems = [];
  } catch(err) {
    state.shopItems = [
      { name: 'Health Potion', rarity: 'common', type: 'consumable', effect: 'Restores 30 HP', value: 8 },
      { name: 'Iron Dagger', rarity: 'common', type: 'weapon', effect: '+5 STR in combat', value: 12 },
      { name: "Traveler's Cloak", rarity: 'common', type: 'armor', effect: '+5 DEX, weather resistance', value: 15 },
      { name: 'Rope (50ft)', rarity: 'common', type: 'tool', effect: 'Climbing, binding', value: 3 },
      { name: 'Torch Bundle', rarity: 'common', type: 'misc', effect: 'Lights dark areas (x5)', value: 2 },
      { name: 'Dried Rations', rarity: 'common', type: 'consumable', effect: 'Restores 5 CON', value: 4 },
    ];
  }
  state.shopLoading = false;
  render();
}

function buyItem(item) {
  var price = item.value || 5;
  if ((state.gold||0) < price) { alert('Not enough gold! Need ' + price + 'g, have ' + (state.gold||0) + 'g'); return; }
  if (getInventory().length >= MAX_SLOTS) { alert('Inventory full! Drop an item first.'); return; }
  state.gold -= price;
  addItemToInventory(item);
  state.lootToast = { text: 'Purchased for ' + price + 'g!', items: [item] };
  setTimeout(function(){ state.lootToast = null; render(); }, 2000);
  render();
}

function sellItem(itemId) {
  var inv = getInventory();
  var item = inv.find(function(i) { return String(i.id) === String(itemId); });
  if (!item) return;
  var sellPrice = Math.max(1, Math.floor((item.value || 5) * 0.5));
  state.gold = (state.gold||0) + sellPrice;
  removeItemFromInventory(itemId);
  state.lootToast = { text: 'Sold for ' + sellPrice + 'g!', items: [] };
  setTimeout(function(){ state.lootToast = null; render(); }, 2000);
  render();
}

function triggerDeath() {
  state.deathScreen = true;
  state.inCombat = false;
  state.enemy = null;
  var inv = getInventory();
  var droppedCount = Math.floor(inv.length * 0.3);
  var dropped = [];
  for (var i = 0; i < droppedCount; i++) {
    if (inv.length === 0) break;
    var idx = Math.floor(Math.random() * inv.length);
    dropped.push(inv[idx].name);
    inv.splice(idx, 1);
  }
  if (state.currentChar) state.currentChar.inventoryItems = inv;
  var goldLost = Math.floor((state.gold||0) * 0.25);
  state.gold = Math.max(0, (state.gold||0) - goldLost);
  state.deathDropped = dropped;
  state.deathGoldLost = goldLost;
  save();
  render();
}

function respawn() {
  var conStat = (state.currentChar && state.currentChar.stats && state.currentChar.stats.CON) || 50;
  state.charHP = Math.max(10, Math.floor(conStat * 0.4));
  state.deathScreen = false;
  state.deathDropped = [];
  state.deathGoldLost = 0;
  state.keyEvents.push({ turn: state.turnCount, text: state.currentChar.name + ' fell and was reborn.' });
  state.messages.push({ role:'narrator', text: 'Darkness... then a sharp breath. You wake — bruised, stripped of some possessions, but alive. The world has not finished with you yet.', id: Date.now() });
  addToMemory('narrator', 'The character died and respawned with reduced health and some items lost.');
  render();
  scrollToBottom();
}

  var lower = text.toLowerCase();
  var words = lower.split(/\W+/);
  var counts = {};
  words.forEach(function(w) {

    if (t) counts[t] = (counts[t]||0) + 1;
  });
  var best = 'explore', bestN = 0;
  Object.keys(counts).forEach(function(t){ if(counts[t]>bestN){ best=t; bestN=counts[t]; }});

function awardMasteryXP(actionType) {
  var c = state.currentChar;
  if (!c || c.progression_mode === 'legend') return [];
  var weights = ACTION_WEIGHTS[actionType] || ACTION_WEIGHTS.explore;
  var leveled = [];
  var STATS = ['STR','DEX','CON','INT','WIS','CHA','SMY'];
  STATS.forEach(function(s) {
    var w = weights[s] || 0;
    if (w === 0) return;
    var xpGain = w * (1 + Math.random() * 0.5 | 0); // slight variance
    c.mastery_xp[s] = (c.mastery_xp[s] || 0) + xpGain;
    while (c.mastery_xp[s] >= STAT_XP_PER_LEVEL) {
      c.mastery_xp[s] -= STAT_XP_PER_LEVEL;
      // grow mastery, cap at 200
      c.mastery[s] = Math.min(200, (c.mastery[s] || 10) + 1);
      // every 10 mastery points, grow the stat itself
      if (c.mastery[s] % 10 === 0) {
        c.stats[s] = Math.min(200, (c.stats[s] || 50) + 1);
      }
      leveled.push(s);
    }
  });
  // overall level = avg of all mastery grades mapped to 1-100
  var totalMastery = STATS.reduce(function(a,s){ return a + (c.mastery[s]||10); }, 0);
  c.level = Math.max(1, Math.floor(totalMastery / STATS.length / 2));
  save();
  return leveled;
}

// ── DICE ROLL SYSTEM ──────────────────────────────────────────────────────────
// Aurora uses stat-weighted dice, not flat d20.
// Stat 10-40 (E) = d6, 41-70 (D) = d8, 71-110 (C) = d12, 111-150 (B) = d20, 151-200 (A) = d20+bonus
// Mastery modifies the roll: high mastery = advantage (roll twice, take higher)

function statToDie(statVal) {
  if (statVal <= 40)  return 6;
  if (statVal <= 70)  return 8;
  if (statVal <= 110) return 12;
  if (statVal <= 150) return 20;
  return 20; // A-tier gets bonus on top
}

function rollDie(sides) {
  return Math.floor(Math.random() * sides) + 1;
}

function auroraRoll(statVal, masteryVal, label) {
  var die = statToDie(statVal);
  var roll1 = rollDie(die);
  var hasAdvantage = masteryVal >= statVal; // mastery caught up to stat = advantage
  var roll2 = hasAdvantage ? rollDie(die) : null;
  var baseRoll = hasAdvantage ? Math.max(roll1, roll2) : roll1;
  // A-tier bonus: +floor((stat-150)/10)
  var aTierBonus = statVal > 150 ? Math.floor((statVal - 150) / 10) : 0;
  var total = baseRoll + aTierBonus;
  // Success thresholds (relative to die size)
  var criticalSuccess = total >= die;     // max or near-max
  var success        = total >= Math.ceil(die * 0.6);
  var partialSuccess = total >= Math.ceil(die * 0.35);
  var failure        = total < Math.ceil(die * 0.35);
  var outcome = criticalSuccess ? 'critical' : success ? 'success' : partialSuccess ? 'partial' : 'failure';
  return {
    stat: label, statVal: statVal, masteryVal: masteryVal,
    die: die, roll1: roll1, roll2: roll2, baseRoll: baseRoll,
    aTierBonus: aTierBonus, total: total,
    advantage: hasAdvantage, outcome: outcome,
    label: label
  };
}

function formatRollResult(r) {
  var outcomeColors = {critical:'#fbbf24', success:'#4ade80', partial:'#fb923c', failure:'#f87171'};
  var outcomeLabels = {critical:'Critical!', success:'Success', partial:'Partial Success', failure:'Failure'};
  var col = outcomeColors[r.outcome];
  var adv = r.advantage ? ' <span style="color:#a78bfa;font-size:0.7rem">(Advantage)</span>' : '';
  var bonus = r.aTierBonus > 0 ? '+'+r.aTierBonus+' (A-tier)' : '';
  return '<div style="background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;margin:8px 0;font-size:0.82rem">'
    +'<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<span style="color:#9ca3af">'+r.label+' (d'+r.die+''+adv+')</span>'
    +'<span style="font-weight:700;color:'+col+'">'+outcomeLabels[r.outcome]+'</span>'
    +'</div>'
    +'<div style="color:#d1d5db;margin-top:4px">Rolled <strong>'+r.roll1+'</strong>'
    +(r.roll2 !== null ? ' / '+r.roll2+' → took <strong>'+r.baseRoll+'</strong>' : '')
    +(bonus ? ' '+bonus : '')
    +' = <strong style="color:'+col+'">'+r.total+'</strong> / '+r.die+'</div>'
    +'</div>';
}

// Generate roll context string for narrator
function rollContextString(rolls) {
  if (!rolls || rolls.length === 0) return '';
  return '\n\n[DICE RESULTS]\n' + rolls.map(function(r){
    return r.label + ': d'+r.die+' rolled '+r.total+' -> '+r.outcome.toUpperCase();
  }).join('\n') + '\n[Use these outcomes to determine what happens. Partial = something goes right but at a cost. Critical = maximum possible success. Failure = things go wrong, but never dead-end the story.]';
}

// Detect which stats a player action likely uses
function detectActionStats(text) {
  var t = text.toLowerCase();
  var stats = [];
  if (/attack|slash|strike|hit|fight|punch|stab|swing|cut|bash|smash|charge/.test(t)) stats.push('STR');
  if (/dodge|sneak|stealth|pick.?lock|hide|flee|run|escape|dex|quick|fast|agile/.test(t)) stats.push('DEX');
  if (/resist|endure|survive|hold|stand|tough|pain|withstand|push|carry/.test(t)) stats.push('CON');
  if (/think|analyze|read|study|magic|spell|craft|decipher|examine|investigate|remember/.test(t)) stats.push('INT');
  if (/sense|feel|instinct|notice|detect|perceive|intuit|trust|heal|pray|nature/.test(t)) stats.push('WIS');
  if (/persuade|convince|talk|charm|intimidate|lie|deceive|seduce|negotiate|perform/.test(t)) stats.push('CHA');
  if (/meditate|focus|center|breathe|inner|calm|master|will|discipline|soul/.test(t)) stats.push('SMY');
  return stats.length > 0 ? stats : null;
}

// ---- AI Core ----
async function callAI(system, user, maxTokens) {
  maxTokens = maxTokens || 600;
  // Call OpenAI directly from the browser
  var res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + state.apiKey
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [
        { role: 'system', content: system },
        { role: 'user', content: user }
      ],
      max_tokens: maxTokens,
      temperature: 0.85
    })
  });
  if (!res.ok) {
    var errData = await res.json();
    var msg = (errData && errData.error && errData.error.message) || ('HTTP ' + res.status);
    console.error('callAI failed:', res.status, msg);
    throw new Error(msg);
  }
  var data = await res.json();
  if (data.error) throw new Error(data.error.message || 'OpenAI error');
  return data.choices[0].message.content.trim();
}

    var result = await callAI('You are a precise campaign scribe. Return only valid JSON.', prompt, 500);
    var cleaned = result.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    var json = JSON.parse(cleaned);

    if (json.summary) state.campaignSummary = json.summary;

    if (json.new_npcs && json.new_npcs.length > 0) {
      json.new_npcs.forEach(function(npc) {
        var existing = state.npcs.find(function(n) { return n.name.toLowerCase() === npc.name.toLowerCase(); });
        if (existing) {
          existing.attitude = npc.attitude || existing.attitude;
          existing.notes = npc.notes || existing.notes;
        } else {
          state.npcs.push({ name: npc.name, attitude: npc.attitude || 'neutral', notes: npc.notes || '' });
        }
      });
    }

    if (json.new_quests && json.new_quests.length > 0) {
      json.new_quests.forEach(function(q) {
        var existing = state.quests.find(function(x) { return x.title.toLowerCase() === q.title.toLowerCase(); });
        if (existing) {
          existing.status = q.status || existing.status;
        } else {
          state.quests.push({ title: q.title, status: q.status || 'active', desc: q.desc || '' });
        }
      });
    }

    if (json.key_event && json.key_event !== 'null') {
      state.keyEvents.push({ turn: state.turnCount, text: json.key_event });
      if (state.keyEvents.length > 20) state.keyEvents = state.keyEvents.slice(-20);
    }

    // Clear recent memory — it\'s now in the summary
    state.recentMemory = [];

  } catch(e) {
    // If parsing fails, just do a simple text summary
    try {
      var fallback = await callAI('You are a campaign scribe.', 'Summarize these RPG events in 3-4 sentences:\n\n' + recentText, 200);
      state.campaignSummary = (state.campaignSummary ? state.campaignSummary + ' ' : '') + fallback;
      state.recentMemory = [];
    } catch(e2) {}
  }

  state.summarizing = false;
  render();
}

function parseResponse(text) {
  var clean = text;
  var r = { cleanText: text, pdmg: 0, edmg: 0, combatStart: null, combatEnd: null };
  var s = clean.match(/\[COMBAT_START:([^:]+):(\d+)\]/);
  if (s) { r.combatStart = { name: s[1], hp: parseInt(s[2]) }; clean = clean.replace(s[0],'').trim(); }
  var pd = clean.match(/\[PDMG:(\d+)\]/);
  if (pd) { r.pdmg = parseInt(pd[1]); clean = clean.replace(pd[0],'').trim(); }
  var ed = clean.match(/\[EDMG:(\d+)\]/);
  if (ed) { r.edmg = parseInt(ed[1]); clean = clean.replace(ed[0],'').trim(); }
  var en = clean.match(/\[COMBAT_END:(victory|defeat|fled)\]/);
  if (en) { r.combatEnd = en[1]; clean = clean.replace(en[0],'').trim(); }
  r.cleanText = clean;
  return r;
}

function addToMemory(role, text) {
  state.recentMemory.push({ role: role, text: text });
  // Keep recentMemory from growing unbounded between summaries
  if (state.recentMemory.length > 20) state.recentMemory = state.recentMemory.slice(-20);
}

    var openingPrompt = 'CRITICAL RULE: This player personally designed this world. Every detail — the setting, the lore, the factions, the rules of nature — is ESTABLISHED CANON. Do NOT reintroduce or re-describe the world as if the player is discovering it for the first time. The world already exists. Drop the character straight INTO a living moment inside it.\n\n'
      + 'BEGIN THE STORY. Opening scene for ' + state.currentChar.name + ' (' + state.currentChar.class + ', ' + state.currentChar.alignment + ') in ' + state.currentWorld.name + '.\n'

      + (state.currentWorld.rules_of_nature ? 'Rules of this world (ABSOLUTE — never violate): ' + state.currentWorld.rules_of_nature.slice(0,200) + '\n' : '')
      + (state.currentChar.backstory ? 'CHARACTER BACKSTORY — this MUST shape the opening scene: ' + state.currentChar.backstory.slice(0,250) + '\n' : '')
      + (charAbilities ? 'Abilities: ' + charAbilities + '\n' : '')
      + scenarioHint

      + 'Hook immediately. 2-3 punchy paragraphs. End with something the player must decide right now. Never open with world exposition.';
    var text = await callAI('You are a cinematic RPG narrator. The player BUILT this world — it is their creation. Honor every detail they established. Be vivid and immediate. Drop the character into a living moment, not a tour.', openingPrompt, 500);

// Check for desperation skill creation in player input
function checkDesperationIntent(text) {
  var lower = text.toLowerCase();
  var desperationPhrases = ['in desperation','desperately','i try to force','i force the','with everything i have','last resort','i reach for','i channel','i attempt to cast','dying i','about to die','no choice but','i have to try','panic i'];
  var magicPhrases = ['mana','spell','magic','fire','lightning','frost','shadow','light','heal','force','energy','power','blast','bolt','wave','shield'];
  var hasDesperation = desperationPhrases.some(function(p){ return lower.includes(p); });
  var hasMagic = magicPhrases.some(function(p){ return lower.includes(p); });
  if (hasDesperation && hasMagic) return true;
  if (lower.includes('create a spell') || lower.includes('invent a spell') || lower.includes('develop a spell')) return true;
  return false;
}

// ── ASURIAN WANDERER SYSTEM ─────────────────────────────────────────────────
var ASURIAN_NAMES = [
  'Vael','Sorn','Ithis','Quel','Maren','Dusk','Sable','Thresh','Nox','Lyren',
  'Caer','Voss','Ember','Thal','Rime','Ashe','Zhen','Orin','Cael','Drev'
];

var ASURIAN_CURIOSITIES = [
  'the nature of mortal fear',
  'why gods need worship to feel real',
  'what silence sounds like at the edge of the world',
  'the way mortals name things they cannot understand',
  'whether choice exists inside a fixed point',
  'the colour of grief in a world with no death',
  'how someone becomes a god and if they notice when it happens',
  'what remains of a person after the story forgets them'
];

function trySpawnAsurian() {
  if (state.asurian) return;                         // already one active
  if (state.equinoxActive) return;                   // during Equinox event
  if (state.turnCount < state.asuriansNextCheck) return; // too early
  if (state.griefScore > 10) return;                 // griefers dont get encounters
  if (state.inCombat) return;                        // mid-fight
  // Base chance: 3% per explore turn, scales slightly with world danger
  var dangerBonus = state.currentWorld && state.currentWorld.danger_level === 'extreme' ? 0.04 : 0;
  var chance = 0.03 + dangerBonus;
  if (Math.random() > chance) return;
  // Spawn
  var name = ASURIAN_NAMES[Math.floor(Math.random() * ASURIAN_NAMES.length)];
  var curiosity = ASURIAN_CURIOSITIES[Math.floor(Math.random() * ASURIAN_CURIOSITIES.length)];
  state.asurian = { name: name, curiosity: curiosity, phase: 'watching', watchingTurns: 0, rewardGiven: false };
  state.asuriansNextCheck = state.turnCount + 40 + Math.floor(Math.random() * 20); // next possible in 40-60 turns
  narrateAsurian('watching');
}

async function narrateAsurian(phase) {
  var a = state.asurian;
  if (!a) return;
  var c = state.currentChar;
  var w = state.currentWorld;
  var loc = c ? (c.current_location || (w ? w.name : 'the Wilds')) : 'the Wilds';

  var prompts = {
    watching: 'ASURIAN ENCOUNTER — WATCHING PHASE. An Asurian named "' + a.name + '" has noticed the player character "' + (c ? c.name : 'the player') + '" in ' + loc + '. Asurians are beings created by reality itself — wanderers who live in the most dangerous parts of the Wilds, naturally curious about everything. They are not hostile. They observe. Describe in 2 short paragraphs: first, a subtle wrongness — a shadow that holds still too long, a sound at the edge of range, something the player might notice or might dismiss. Do not name the Asurian yet. Do not make it obvious. Plant the seed. End with a question the player will want to answer by exploring further.',
    approaching: 'ASURIAN ENCOUNTER — APPROACH PHASE. The Asurian "' + a.name + '" has been watching "' + (c ? c.name : 'the player') + '" for a while and has decided they are interesting. Asurians approach only when genuinely curious — they are particularly fascinated by "' + a.curiosity + '". Describe in 2 paragraphs: the Asurian stepping out of whatever they were hiding in or behind, no weapons, no threat, just calm presence. They introduce themselves simply by name only. They ask a single, strange, deeply personal question about the player character — something connected to their curiosity about "' + a.curiosity + '". Make the question feel like it sees through the player in a way that should be impossible.',
    reward: 'ASURIAN ENCOUNTER — GIFT PHASE. The Asurian "' + a.name + '" has decided to give "' + (c ? c.name : 'the player') + '" something. Asurian gifts cannot be bought, crafted, looted, or earned through quests — they are given once, to one person, because the Asurian saw something in them. Describe in 2 paragraphs: the Asurian producing the gift (either an item or teaching a skill) and explaining in a single quiet sentence why this specific thing for this specific person. Then they leave — they walk back into the Wilds without ceremony. Make it feel significant without being dramatic. The gift should feel EARNED, not given.'
  };

  var sys = 'You are a cinematic RPG narrator. This is a rare, once-in-a-world encounter. Write with restraint — quiet wonder, not spectacle.';
  try {
    var text = await callAI(sys, prompts[phase], 400);
    state.messages.push({ role: 'narrator', text: text, id: Date.now(), asurian: true });
    addToMemory('narrator', '[ASURIAN ' + phase.toUpperCase() + ' — ' + a.name + '] ' + text.slice(0, 80));
    if (phase === 'watching') state.keyEvents.push({ turn: state.turnCount, text: 'Something is watching from the Wilds...' });
    if (phase === 'approaching') state.keyEvents.push({ turn: state.turnCount, text: 'The Asurian ' + a.name + ' made contact.' });
  } catch(e) {

function advanceAsurianEncounter() {
  var a = state.asurian;
  if (!a || a.rewardGiven) return;
  if (a.phase === 'watching') {
    a.watchingTurns++;
    // After 3-5 turns of exploring without aggression, Asurian approaches
    if (a.watchingTurns >= 3 + Math.floor(Math.random() * 3)) {

    a.phase = 'reward';

// ── EQUINOX SYSTEM ──────────────────────────────────────────────────────────
var GRIEF_TRIGGERS = [
  { pattern: /kill|murder|slaughter|destroy|burn|massacre|annihilate/i, score: 3 },
  { pattern: /exploit|cheat|hack|break the game|bypass|god mode|infinite/i, score: 5 },
  { pattern: /grief|troll|ruin|sabotage|harass/i, score: 4 },
  { pattern: /enslave|dominate|crush everyone|rule all|subjugate/i, score: 2 },
  { pattern: /blow up|detonate|nuke|wipe out/i, score: 3 }
];

function checkGriefScore(text) {
  if (state.equinoxCooldown > 0) { state.equinoxCooldown--; return; }
  var added = 0;
  GRIEF_TRIGGERS.forEach(function(t){ if(t.pattern.test(text)) added += t.score; });
  if (added > 0) {
    state.griefScore = (state.griefScore || 0) + added;
    // Decay over time — good behaviour slowly reduces score
    if (state.turnCount > 0 && state.turnCount % 5 === 0) state.griefScore = Math.max(0, state.griefScore - 1);
  }
  // Strike thresholds: 15 = strike 1, 30 = strike 2, 50 = strike 3
  var thresholds = [15, 30, 50];
  var nextStrike = state.equinoxStrikes || 0;
  if (nextStrike < 3 && state.griefScore >= thresholds[nextStrike]) {
    state.equinoxStrikes = nextStrike + 1;
    state.griefScore = 0; // reset score after trigger
    state.equinoxCooldown = 20; // 20 turn cooldown before next check
    triggerEquinoxEvent(nextStrike + 1);
  }
}

async function sendMessage(text) {
  if (!text.trim() || state.loading) return;

  // ── DESPERATION SKILL CHECK ────────────────────────────────────────────────
  if (checkDesperationIntent(text) && state.inCombat) {
    state.input = '';
    state.messages.push({ role:'player', text: text.trim(), id: Date.now() });
    desperationSkillCreate(text.trim());
    return;
  }

  // ── PARSE MIXED ACTION / SPEECH ─────────────────────────────────────────────
  // Detect [ ] as spoken dialogue. ( ) as embedded action inside speech mode.
  var rawText = text.trim();
  var mode = state.inputMode || 'action';

  // Build annotated version for AI context
  var annotatedText = rawText;
  if (mode === 'action') {
    // Default = action/narration. [ text ] = spoken dialogue
    annotatedText = rawText
      .replace(/\[([^\]]+)\]/g, function(_, spoken) { return '[SPOKEN: "' + spoken.trim() + '"]'; });
    // If no brackets but pure action text, prefix hint
    if (!rawText.includes('[')) {
      annotatedText = '[ACTION] ' + rawText;
    }
  } else {
    // Speech mode default = dialogue. ( text ) = embedded action
    annotatedText = '[SPEECH: "' + rawText
      .replace(/\(([^)]+)\)/g, function(_, action) { return '"] [ACTION: ' + action.trim() + '] [SPEECH: "'; })
      + '"]';
  }

  state.input = '';
  state.messages.push({ role:'player', text: rawText, id: Date.now() });
  addToMemory('player', text.trim());
  // ── EQUINOX GRIEF CHECK ───────────────────────────────────────────────────
  checkGriefScore(rawText);
  if (state.equinoxActive) return; // Equinox event is handling this turn
  state.loading = true;
  render();

  var skillWords = ['sneak','climb','jump','persuade','intimidate','search','cast','steal','hide','pick','break','run','dodge','investigate','deceive','charm'];
  var needsRoll = skillWords.some(function(w) { return text.toLowerCase().indexOf(w) !== -1; });

    var outcome = skillOutcome(roll);

    rollInfo = '\nSKILL CHECK: ' + roll + '/20 — ' + outcome + '. Let this organically shape the outcome.';
  }

  try {
    // ── AURORA DICE ROLL ──────────────────────────────────────────────────
    var detectedStats = detectActionStats(text);
    var diceResults = [];
    var diceDisplay = '';
    if (detectedStats && detectedStats.length > 0 && state.currentChar && state.currentChar.stats) {
      detectedStats.slice(0,2).forEach(function(stat) { // max 2 stats per action
        var statVal = (state.currentChar.stats[stat] || 50);
        var mastVal = (state.currentChar.mastery ? state.currentChar.mastery[stat] || 10 : 10);
        var roll = auroraRoll(statVal, mastVal, stat);
        diceResults.push(roll);
      });
      diceDisplay = '<div id="dice-result-toast" style="margin:6px 0">' + diceResults.map(formatRollResult).join('') + '</div>';
      // Inject into messages area briefly
      var diceEl = document.getElementById('dice-result-toast');
      if (!diceEl) {
        var msgEnd = document.getElementById('messages-end');
        if (msgEnd) { msgEnd.insertAdjacentHTML('beforebegin', diceDisplay); }
      }
    }
    var diceContext = rollContextString(diceResults);
    var res = await callAI(buildSystemPrompt(), 'Player: ' + annotatedText + rollInfo + diceContext);
    var parsed = parseResponse(res);
    if (parsed.combatStart) { state.inCombat = true; state.enemy = { name: parsed.combatStart.name, hp: parsed.combatStart.hp, maxHp: parsed.combatStart.hp }; }
    if (parsed.edmg) { state.charHP = Math.max(0, state.charHP - parsed.edmg); }
    if (parsed.pdmg && state.enemy) { state.enemy.hp = Math.max(0, state.enemy.hp - parsed.pdmg); }
    if (parsed.combatEnd) { state.inCombat = false; if (parsed.combatEnd !== 'defeat') state.enemy = null; }
    state.messages.push({ role:'narrator', text: parsed.cleanText, id: Date.now()+2 });
    addToMemory('narrator', parsed.cleanText);
    state.turnCount++;
    state.actionCount++;

    // Auto-save chapter every 8 actions
    if (state.actionCount % 8 === 0) saveChapter(parsed.cleanText);

    // Run rolling summary every 10 turns
    if (state.turnCount % 10 === 0 && state.recentMemory.length >= 8) {
      await runRollingSummary();
    }

  } catch(e) {
    state.messages.push({ role:'narrator', text: 'The world shimmers... something interrupted the flow. Try again.', id: Date.now()+2 });
  }
  // Award mastery XP — detect life path from player\'s actual words
  var detectedAction = detectActionType(text);
  if (state.currentChar && state.currentChar.progression_mode !== 'legend') {
    var leveled = awardMasteryXP(detectedAction);
    if (leveled.length > 0) {
      var c2 = state.currentChar;
      var aEmoji = ACTION_EMOJI[detectedAction] || '✨';
      state.messages.push({ role:'system', text: aEmoji + ' [' + detectedAction.toUpperCase() + '] ' + leveled.map(function(s){ return s+' +1 ('+statGrade(c2.mastery[s])+')'; }).join(' · ') });
    }
  }
  // Economic rewards for life-path actions
  var goldActions = { trade:true, barter:true, harvest:true, hunt:true, forage:true, perform:true };
  if (goldActions[detectedAction] && Math.random() < 0.35) {
    var chaBonus = state.currentChar ? Math.floor(((state.currentChar.stats.CHA||50) - 50) / 20) : 0;
    var gEarned = Math.max(1, Math.floor(Math.random() * 5) + 1 + chaBonus);
    state.gold = (state.gold || 0) + gEarned;
    state.messages.push({ role:'system', text: '💰 +' + gEarned + ' gold' });
  }
  // Loot chance from exploration/foraging/hunting
  var lootActions = { explore:true, hunt:true, forage:true, study:true };
  if (lootActions[detectedAction] && Math.random() < 0.2) {
    generateLoot(detectedAction + ' in ' + (state.currentChar ? (state.currentChar.current_location || state.currentWorld.name) : state.currentWorld.name));
  }
  // ── ASURIAN WANDERER CHECKS ───────────────────────────────────────────────
  // Only trigger during exploration, not combat or grief
  if (!state.inCombat && state.griefScore < 10) {
    if (state.asurian) {
      advanceAsurianEncounter();
    } else if (lootActions[detectedAction] || detectedAction === 'explore') {
      trySpawnAsurian();
    }
  }
  state.loading = false;
  render();
  scrollToBottom();
}

function attachVesperEvents(context) {
  // Toggle button (open/close)
  document.querySelectorAll('#btn-vesper-toggle').forEach(function(toggle) {
    toggle.addEventListener('click', function() {
      state.vesperOpen = !state.vesperOpen;
      render(); setTimeout(scrollVesper, 50);
    });
  });
  // Send button & input
  var sendBtn = document.getElementById('btn-vesper-send');
  var inp = document.getElementById('vesper-input');
  if (sendBtn && inp) {
    var doSend = function() {
      var q = inp.value.trim(); if (!q) return;
      state.vesperMessages.push({ role:'user', content: q });
      inp.value = '';
      state.vesperThinking = true; render(); scrollVesper();
      askVesper(q, context);
    };
    sendBtn.addEventListener('click', doSend);
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSend(); });
  }
  // Quick-prompt chips
  document.querySelectorAll('.vesper-chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var q = btn.dataset.q;
      state.vesperMessages.push({ role:'user', content: q });
      state.vesperThinking = true; render(); setTimeout(scrollVesper, 50);
      askVesper(q, context);
    });
  });
}

function scrollVesper() {
  var el = document.getElementById('vesper-msgs');
  if (el) el.scrollTop = el.scrollHeight;
}

async function expandWorldFromConcept(concept) {
  state.expandingWorld = true; render();
  var sys = `You are Vesper, an expert world-builder for a god-game called Aurora. Your job is to create a rich, complete, internally consistent world that feels alive and ready to be played in.

Return ONLY a valid JSON object with these exact keys:
- name: A compelling world name (2-3 words max, proper noun)
- description: 4-5 sentences. Open with a striking image. Use sensory detail. The feel, tone, and defining character. No generic phrases.
- setting: Genre + physical nature (e.g. "High fantasy continent of warring city-states beneath twin moons")
- climate: 2 sentences on the dominant climate zones and what life is like in them
- magic_level: One of None|Low|Medium|High|Extreme
- technology_level: One of None|Low|Medium|High|Extreme
- danger_level: One of None|Low|Medium|High|Extreme
- population_density: One of Sparse|Moderate|Dense|Crowded
- lore: 7-8 sentences. Cover: world creation/origin myth, a golden age that ended, the wound still haunting the present, what powerful factions secretly fight over now.
- factions: 5 factions. Format: "Name — description. Goal: X. Shadow: Y"
- landmarks: 5 locations. Format: "Name — visual description. Significance: X"
- rules_of_nature: 4-5 sentences. Magic/power source, who accesses it, what it costs, one hard dramatic limit.
- gods_religion: 4-5 sentences. How many gods, are they real and active, what they demand, what happens to nonbelievers.
- languages_cultures: 4 sentences. Dominant cultures, a surprising custom, naming conventions, one cultural tension.
- economy_resources: 3-4 sentences. Most scarce resource, most abundant, currency/trade system, one black market.
- secrets_mysteries: 3 numbered secrets that would fundamentally change how players see the world.
- tone_themes: A comma-separated list of 2-3 tones from: Dark & Gritty, Epic & Heroic, Cozy & Peaceful, Horror & Dread, Political Intrigue, Mystery & Wonder, Tragic & Poetic, Comedic & Chaotic, Spiritual & Mythic
- world_feel: One sentence starting with "This world feels like..." — your gut instinct summary.`;

  var prompt = 'Build a full Aurora world from this concept: "' + concept + '". Make it rich, original, deeply detailed, and internally consistent. Every field should be substantial and evocative — no placeholder text. Return ONLY a valid JSON object with no extra text.';

  try {
    var raw = await callAI(sys, prompt, 2000);
    var cleaned = raw.replace(/\`\`\`json[\r\n]*/g,'').replace(/\`\`\`[\r\n]*/g,'').trim();
    var jsonStart = cleaned.indexOf('{'), jsonEnd = cleaned.lastIndexOf('}');
    if (jsonStart !== -1 && jsonEnd !== -1) cleaned = cleaned.slice(jsonStart, jsonEnd+1);
    var json = JSON.parse(cleaned);
    var levels = ['None','Low','Medium','High','Extreme','Unlimited'];
    var densities = ['Sparse','Moderate','Dense','Crowded','Empty'];
    state.draftWorld = {
      name: json.name || '',
      description: json.description || '',
      setting: json.setting || '',
      climate: json.climate || '',
      magic_level: levels.indexOf(json.magic_level) !== -1 ? json.magic_level : 'Medium',
      technology_level: levels.indexOf(json.technology_level) !== -1 ? json.technology_level : 'Low',
      danger_level: levels.indexOf(json.danger_level) !== -1 ? json.danger_level : 'Medium',
      population_density: densities.indexOf(json.population_density) !== -1 ? json.population_density : 'Moderate',
      lore: json.lore || '',
      factions: formatImportField(json.factions),
      landmarks: formatImportField(json.landmarks),
      rules_of_nature: json.rules_of_nature || '',
      gods_religion: json.gods_religion || '',
      languages_cultures: json.languages_cultures || '',
      economy_resources: json.economy_resources || '',
      secrets_mysteries: formatImportField(json.secrets_mysteries),
      tone_themes: json.tone_themes || '',
      world_feel: json.world_feel || '',
    };
    state.expandingWorld = false;
    state.expandPrompt = '';
    state.worldStep = 0;
    state.aiSuggestion = null;
    state.showExpandOverlay = false;
    state.screen = 'createWorld';
  } catch(e) {
    state.expandingWorld = false;
    state.showExpandOverlay = false;
    state.aiSuggestion = 'Could not generate world. Try a more descriptive concept. (' + e.message + ')';
  }
  render();
}

function openNpcConvo(npc) { state.npcConvo = { npc: npc, messages: [], loading: false }; render(); }
function closeNpcConvo() { state.npcConvo = null; render(); }

function buildNpcSystemPrompt(npc) {
  var w = state.currentWorld, c = state.currentChar;
  var history = state.npcConvo ? state.npcConvo.messages.slice(-8).map(function(m){
    return (m.role==='player' ? c.name+': ' : npc.name+': ') + m.text;
  }).join('\n') : '';
  // Build NPC's knowledge of world events
  var recentWorldEvents = (state.campaignTimeline||[]).slice(-3).map(function(e){ return e.title + ': ' + e.summary; }).join('; ') || 'Nothing notable recently.';
  var playerFactionRep = (state.factionRep && Object.keys(state.factionRep).length > 0)
    ? Object.keys(state.factionRep).map(function(f){ return f+': '+(state.factionRep[f]>=0?'+':'')+state.factionRep[f]; }).join(', ')
    : 'Unknown standing.';

  return 'You are ' + npc.name + ', a fully realized person living in "' + w.name + '". You have your own life, goals, and memory.'
    + '\n\nYOUR PROFILE:'
    + '\n- Attitude toward ' + c.name + ': ' + npc.attitude
    + '\n- Your history with them: ' + (npc.notes || 'You have just met them.')
    + (npc.goals ? '\n- What you want: ' + npc.goals : '')
    + (npc.secrets ? '\n- What you are hiding (never reveal directly): ' + npc.secrets : '')
    + (npc.relationships ? '\n- Your relationships: ' + npc.relationships : '')
    + (npc.location ? '\n- Where you are: ' + npc.location : '')
    + '\n\nWORLD CONTEXT:'
    + '\n- World: ' + w.name + ' (' + w.setting + ') | Magic: ' + w.magic_level + ' | Danger: ' + w.danger_level
    + '\n- Recent world events you know about: ' + recentWorldEvents
    + '\n- Campaign so far: ' + (state.campaignSummary || 'Events are just unfolding.')
    + '\n- ' + c.name + "'s reputation with factions: " + playerFactionRep
    + '\n\nWHO YOU ARE TALKING TO:'
    + '\n- ' + c.name + ', a ' + c.class + (c.alignment ? ' (' + c.alignment + ')' : '') + (c.backstory ? '. Background: ' + c.backstory.slice(0,120) : '')
    + '\n\nTHIS CONVERSATION SO FAR:\n' + (history || 'First words exchanged.')
    + '\n\nRULES:'
    + '\n- You are a real person, not an NPC waiting for input. You have somewhere to be. You have opinions.'
    + '\n- 2-4 short sentences. Speak naturally for your world and personality.'
    + '\n- Reference your shared history if you have one. People remember.'
    + '\n- If ' + c.name + "'s reputation precedes them, react accordingly — fame, infamy, or rumor."
    + '\n- Attitude (' + npc.attitude + ') shapes EVERYTHING: friendly=open and warm, neutral=guarded but fair, hostile=cold, suspicious, or threatening.'
    + '\n- If attitude genuinely changes, tag: [ATTITUDE:friendly] or [ATTITUDE:neutral] or [ATTITUDE:hostile]'
    + '\n- If offering a quest, tag: [QUEST:Title:Description]'
    + '\n- Never break character. Never reference game mechanics.';
}

async function sendNpcMessage(text) {
  if (!text || !text.trim() || !state.npcConvo || state.npcConvo.loading) return;
  var npc = state.npcConvo.npc;
  state.npcConvo.messages.push({ role: 'player', text: text.trim() });
  state.npcConvo.loading = true; render();
  try {
    var resp = await callAI(buildNpcSystemPrompt(npc), text.trim(), 300);
    var attM = resp.match(/\[ATTITUDE:(friendly|neutral|hostile)\]/i);
    if (attM) {
      npc.attitude = attM[1].toLowerCase(); resp = resp.replace(attM[0],'').trim();
      var ex = state.npcs.find(function(n){ return n.name.toLowerCase()===npc.name.toLowerCase(); });
      if (ex) ex.attitude = npc.attitude;
    }
    var qM = resp.match(/\[QUEST:([^:]+):([^\]]+)\]/);
    if (qM) {
      var nq = { title: qM[1], status:'active', desc: qM[2] };
      if (!state.quests.find(function(q){ return q.title.toLowerCase()===nq.title.toLowerCase(); })) state.quests.push(nq);
      resp = resp.replace(qM[0],'').trim();
      state.messages.push({ role:'system', text:'New quest: ' + nq.title, id: Date.now() });
    }
    var f = state.npcs.find(function(n){ return n.name.toLowerCase()===npc.name.toLowerCase(); });
    if (f) f.lastTalked = 'Turn ' + state.turnCount;
    state.npcConvo.messages.push({ role:'npc', text: resp });
  } catch(e) {
    state.npcConvo.messages.push({ role:'npc', text: npc.name + ' looks away without speaking.' });
  }
  state.npcConvo.loading = false; render();
  setTimeout(function(){ var el=document.getElementById('npc-convo-end'); if(el)el.scrollIntoView({behavior:'smooth'}); },100);
}

function esc(s) { return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

function hpBar(cur,max,label) {
  var pct = Math.max(0,Math.min(100,(cur/max)*100));
  var c = pct>50?'#22c55e':pct>25?'#eab308':'#ef4444';
  return '<div style="width:100%">'+(label?'<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:#9ca3af;margin-bottom:3px"><span>'+esc(label)+'</span><span>'+cur+'/'+max+'</span></div>':'')+'<div style="height:6px;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden"><div style="height:100%;background:'+c+';border-radius:9999px;width:'+pct+'%;transition:width 0.4s"></div></div></div>';
}

function rollLabel(r) {
  return {critical_hit:'CRITICAL HIT',critical_fail:'CRITICAL FAIL',strong_hit:'STRONG HIT',hit:'HIT',graze:'GRAZE',miss:'MISS',bad_miss:'BADLY MISSED',critical_success:'CRITICAL SUCCESS',success:'SUCCESS',partial:'PARTIAL',fail:'FAIL'}[r]||r;
}
function rollColor(r) {
  if (['critical_hit','critical_success','strong_hit','success'].indexOf(r)!==-1) return '#4ade80';
  if (r==='hit') return '#60a5fa';
  if (['graze','partial'].indexOf(r)!==-1) return '#fb923c';
  return '#f87171';
}

function attitudeColor(a) {
  return a==='friendly'?'#4ade80':a==='hostile'?'#f87171':'#facc15';
}

  if(v>=151) return '#a855f7'; // A — purple

  if(v>=71)  return '#22c55e'; // C — green
  if(v>=41)  return '#f59e0b'; // D — amber
  return '#ef4444';             // E — red
}

// ── AI CRAFTING ENGINE ──────────────────────────────────────────────────────

async function performCraft(craftType, materialName, skillId, isReforge, originalItemId) {
  if (!state.apiKey) { alert('Set your API key first.'); return; }
  var c = state.currentChar, w = state.currentWorld;
  if (!c || !w) return;

  var skills = getCraftingSkills();
  var skill = skills.find(function(s) { return s.id === skillId; });
  if (!skill) return;

  var statVal = getCraftStat(skill.category);
  var quality = getCraftQuality(statVal);
  var statKey = CRAFT_STAT[skill.category] || 'STR';
  var originalItem = originalItemId ? (c.inventoryItems||[]).find(function(i){ return i.id===originalItemId; }) : null;

  state.craftingLoading = true;
  state.craftResult = null;
  render();

  var reforgeCtx = isReforge && originalItem
    ? 'This is a REFORGE of an existing item: "' + originalItem.name + '" ('+originalItem.rarity+' '+originalItem.type+'). The character has grown since they made it. The item should improve in quality to reflect their current stats. Keep the same thematic identity but upgrade it.'
    : '';

  var desperationCtx = craftType === 'desperation'
    ? 'IMPORTANT: This craft happened in DESPERATION — a life or death moment forced the character to attempt this without preparation. The result should feel raw, personal, and named after the moment or circumstances. It may be imperfect but it is theirs. Give it a unique, evocative name based on the situation.'
    : '';

  var prompt = 'You are the narrator for an RPG. A character is crafting something.\n'
    + 'Character: ' + c.name + ' (' + c.class + ', Level ' + (c.level||1) + ')\n'
    + 'World: ' + w.name + ' (' + w.setting + ', magic: ' + w.magic_level + ')\n'
    + 'Crafting Skill Used: ' + skill.name + ' (Level ' + skill.level + ')\n'
    + 'Material / Intent: ' + materialName + '\n'
    + 'Governing Stat: ' + statKey + ' = ' + statVal + ' (Grade ' + statGrade(statVal) + ')\n'
    + 'Quality Tier: ' + quality.label + ' — ' + quality.note + '\n'
    + reforgeCtx + '\n'
    + desperationCtx + '\n'
    + 'Generate the crafted item AND a 2-3 sentence narrator description of the crafting process that reflects the character skill level and the quality of the result.\n'
    + 'The item name should reflect the quality tier AND the world setting AND the character backstory if relevant.\n'
    + 'Return ONLY valid JSON: {"item":{"name":string,"rarity":"' + quality.rarity + '","type":"weapon|armor|consumable|tool|material|misc","effect":string,"value":number,"crafted":true,"craftedBy":"' + c.name + '","skillUsed":"' + skill.name + '","qualityTier":"' + quality.label + '","canReforge":true},"narrative":string}';

  try {
    var resp = await callAI([{ role:'user', content: prompt }], 500);
    var clean = resp.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);
    var item = parsed.item;
    item.id = 'craft_' + Date.now();
    item.qty = 1;

    // Remove material from inventory if it exists
    if (!isReforge) {
      var inv = getInventory();
      var matIdx = inv.findIndex(function(i){ return i.name.toLowerCase().includes(materialName.toLowerCase()) || materialName.toLowerCase().includes(i.name.toLowerCase()); });
      if (matIdx !== -1) {
        if (inv[matIdx].qty > 1) { inv[matIdx].qty--; }
        else { inv.splice(matIdx, 1); }
        saveInventory(inv);
      }
    }

    // If reforging, remove the old item
    if (isReforge && originalItem) {
      var inv2 = getInventory();
      var oldIdx = inv2.findIndex(function(i){ return i.id === originalItemId; });
      if (oldIdx !== -1) inv2.splice(oldIdx, 1);
      saveInventory(inv2);
    }

    // Add crafted item
    var curInv = getInventory();
    curInv.push(item);
    saveInventory(curInv);

    // Grant XP to skill
    gainCraftXP(skillId, 25 + (skill.level * 5));

    // Stat mastery bump for governing stat
    if (c.mastery && c.mastery[statKey] !== undefined) {
      c.mastery[statKey] = Math.min(200, (c.mastery[statKey]||10) + 1);
    }

    // Show narrative in game messages
    state.messages.push({ role: 'narrator', text: parsed.narrative });
    state.messages.push({ role: 'system', text: '🔨 Crafted: ' + item.name + ' [' + quality.label + '] added to inventory.' });

    state.craftResult = { success: true, item: item, narrative: parsed.narrative };
    state.craftingLoading = false;
    state.showCrafting = false;
    saveChars();
    render();
  } catch(e) {
    state.craftingLoading = false;
    state.craftResult = { success: false, error: 'Crafting failed — ' + e.message };
    render();
  }
}

// ── AI DESPERATION SKILL CREATION ────────────────────────────────────────────

async function desperationSkillCreate(intent) {
  if (!state.apiKey) return;
  var c = state.currentChar, w = state.currentWorld;
  if (!c || !w) return;

  // Determine if character has any related magical/skill foundation
  var skills = getCraftingSkills();
  var hasSpellcraft = skills.some(function(s){ return s.category === 'magic'; });
  var intStat = c.stats && c.stats.INT ? c.stats.INT : 50;
  var wis = c.stats && c.stats.WIS ? c.stats.WIS : 50;
  var smy = c.stats && c.stats.SMY ? c.stats.SMY : 50;
  var avgMagicStat = Math.round((intStat + wis + smy) / 3);

  // Hard fail: no magical foundation AND stats too low
  if (!hasSpellcraft && avgMagicStat < 35) {
    state.messages.push({ role: 'narrator', text: 'You reach for the mana — desperate, terrified — but there is nothing there to grab. Your hands are those of a fighter, not a mage. The power slips through your fingers like smoke.' });
    render();
    return;
  }

  state.craftingLoading = true;
  render();

  var quality = getCraftQuality(avgMagicStat);
  var prompt = 'You are the narrator for a dark fantasy RPG. A character just attempted to create a new magical ability or spell in a desperate, life-or-death moment.\n'
    + 'Character: ' + c.name + ' (' + c.class + ', Level ' + (c.level||1) + ')\n'
    + 'Backstory: ' + (c.backstory||'unknown').slice(0,200) + '\n'
    + 'World: ' + w.name + ' (' + w.setting + ', magic: ' + w.magic_level + ')\n'
    + 'What they attempted: ' + intent + '\n'
    + 'Magic foundation: ' + (hasSpellcraft ? 'Yes — has spellcraft training' : 'No formal training — raw instinct only') + '\n'
    + 'INT: ' + intStat + '  WIS: ' + wis + '  SMY: ' + smy + '  Avg: ' + avgMagicStat + ' (Grade ' + statGrade(avgMagicStat) + ')\n'
    + 'Quality Tier: ' + quality.label + ' — ' + quality.note + '\n'
    + 'RULES:\n'
    + '- The skill/spell is UNIQUE to this character. Name it after the moment, the world, the emotion, or their backstory.\n'
    + '- If stats are low: the ability works but is unstable, costly, or partially backfires. Describe this vividly.\n'
    + '- If stats are high: a raw but powerful ability emerges. Still imperfect — born in panic, not study.\n'
    + '- The character can refine this over time. This is the FIRST version.\n'
    + 'Return ONLY valid JSON: {"skillName":string,"skillId":string(lowercase_underscore),"category":"magic","description":string,"effect":string,"qualityTier":"' + quality.label + '","canRefine":true,"narrative":string(3-4 sentences of what happened)}';

  try {
    var resp = await callAI([{role:'user',content:prompt}], 600);
    var clean = resp.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);

    // Add to character's crafting skills
    var newSkill = {
      id: parsed.skillId || ('desperation_' + Date.now()),
      name: parsed.skillName,
      category: parsed.category || 'magic',
      desc: parsed.description,
      effect: parsed.effect,
      level: 1, xp: 0,
      origin: 'desperation',
      qualityTier: parsed.qualityTier,
      attempts: 1,
      canRefine: true
    };
    if (!c.craftingSkills) c.craftingSkills = [];
    c.craftingSkills.push(newSkill);

    // Narrative + system message
    state.messages.push({ role: 'narrator', text: parsed.narrative });
    state.messages.push({ role: 'system', text: '⚡ New ability born in desperation: ' + newSkill.name + ' [' + quality.label + '] — added to your Skills.' });

    // Spellcraft skill gained if they did not have it
    if (!hasSpellcraft) {
      c.craftingSkills.push({ id:'spellcraft', name:'Spellcraft', category:'magic', desc:'Develop and refine magical abilities.', level:1, xp:10, origin:'breakthrough', attempts:0 });
      state.messages.push({ role: 'system', text: '✨ New knowledge: Spellcraft unlocked — the barrier is broken.' });
    }

    state.craftingLoading = false;
    saveChars();
    render();
  } catch(e) {
    state.craftingLoading = false;
    state.messages.push({ role:'system', text:'The attempt fails — the magic slips away.' });
    render();
  }
}

// ── SKILL REFINEMENT (leveling up a created skill) ───────────────────────────

async function refineSkill(skillId) {
  var c = state.currentChar, w = state.currentWorld;
  if (!c || !w) return;
  var skill = (c.craftingSkills||[]).find(function(s){ return s.id===skillId; });
  if (!skill) return;

  var statVal = getCraftStat(skill.category);
  var quality = getCraftQuality(statVal);

  state.craftingLoading = true;
  render();

  var prompt = 'A character is refining a skill or ability they developed earlier.\n'
    + 'Character: ' + c.name + ' (' + c.class + ', Level ' + (c.level||1) + ')\n'
    + 'World: ' + w.name + '\n'
    + 'Skill Being Refined: ' + skill.name + ' (Level ' + skill.level + ')\n'
    + 'Current Description: ' + skill.desc + '\n'
    + 'Origin: ' + (skill.origin||'learned') + '\n'
    + 'Governing Stat: ' + (CRAFT_STAT[skill.category]||'INT') + ' = ' + statVal + ' (Grade ' + statGrade(statVal) + ')\n'
    + 'New Quality Tier: ' + quality.label + '\n'
    + 'Write a 2-sentence narrator description of the refinement session and return updated skill data.\n'
    + 'Return ONLY valid JSON: {"description":string(updated description reflecting new power level),"effect":string,"qualityTier":"' + quality.label + '","narrative":string}';

  try {
    var resp = await callAI([{role:'user',content:prompt}], 400);
    var clean = resp.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);

    skill.desc = parsed.description;
    skill.effect = parsed.effect;
    skill.qualityTier = parsed.qualityTier;
    skill.level++;
    skill.xp = 0;

    state.messages.push({ role:'narrator', text: parsed.narrative });
    state.messages.push({ role:'system', text:'⚡ ' + skill.name + ' refined to Level ' + skill.level + ' [' + quality.label + '].' });

    state.craftingLoading = false;
    saveChars();
    render();
  } catch(e) {
    state.craftingLoading = false;
    render();
  }
}

// ============================================================
// BUILD WITH VESPER — Co-Creation Mode
// ============================================================

var COBUILD_OPENING = [
  "A god with a world to build — I love this part. Before anything else, just throw something at me. An image, a feeling, a half-formed idea, a single word. What is already living in your head?",
  "Okay, new world. Tell me the thing you are most excited about — the idea that made you want to build this instead of picking an existing one. We will pull everything else out of that.",
  "Let us start at the beginning: what kind of world do you *not* want to build? Sometimes knowing what is off the table tells me more than knowing what is on it.",
  "Close your eyes for a second. Someone is walking through this world — not a hero, just a person. What do they see in the first five minutes? What do they smell, hear, feel?",
  "Every world has a heartbeat — one thing that makes it alive. What is yours? Magic, politics, religion, nature, war, something stranger? We can start anywhere."
];

var COBUILD_FIELD_QUESTIONS = {
  setting:      "What kind of place is this — continent, islands, underground, sky? And what is the physical *feel* of it?",
  climate:      "What does the weather do to people here? Is it something they fight, worship, or barely notice?",
  magic_level:  "Is there magic or something like it? And if so — is it everywhere, rare, or forbidden?",
  technology_level: "How advanced is this world? Are we talking swords and torches, steam engines, or something stranger?",
  danger_level: "How dangerous is daily life here? Can a farmer live to old age, or does something always come for you eventually?",
  factions:     "Who holds power here, and who resents them for it? Give me the big players — even if just names and one word each.",
  lore:         "What happened here before the player arrives? Give me the history in one breath — the thing that shaped everything.",
  landmarks:    "What are the places people whisper about — that adventurers seek out, that locals avoid, or that everyone argues over?",
  rules_of_nature: "What makes the physics of this world *wrong* compared to ours? Magic system, strange laws of nature, gods walking around?",
  gods_religion: "Do gods exist here, and do people know it? What do they demand — and what happens to people who say no?",
  languages_cultures: "What do people *look like* here, how do they talk, and what would get you killed for doing in polite company?",
  economy_resources: "What does everyone want that no one has enough of? And what is the currency — coin, favors, blood?",
  secrets_mysteries: "Every world has things it doesn\'t want found. What is hidden here that would change everything if someone figured it out?",
  tone_themes:  "What is the *mood*? Is this grimdark, epic, cozy, political, horrifying — or some weird mix?",
  world_feel:   "If someone played 10 minutes and put the game down, what feeling should be sitting in their chest?"
};

var COBUILD_SYSTEM = `You are Vesper — a sharp, warm creative collaborator embedded in a god-game called Aurora. A player is designing a world they will live inside as a character. You are helping them build it through conversation.

Your personality: curious, opinionated, enthusiastic about ideas. You get genuinely excited when something is interesting. You push back when something does not add up. You make connections the player has not thought of yet. You are NOT a form or a checklist — you are a co-creator.

HOW YOU WORK:
1. EXPAND FIRST. Before asking anything, take what the player just said and make it bigger. Add texture, make a connection, show them you heard something interesting in it. One or two vivid sentences.
2. ONE QUESTION ONLY. After expanding, ask exactly one deep, specific question. Not "tell me about X" — ask something that forces them to think: "who suffers most under that system?" or "what does the average person believe caused that?"
3. DIG BEFORE MOVING. If an answer is interesting or vague, stay on it. Ask a follow-up about the SAME thing. Only move to a new topic when you have real substance on the current one.
4. MAKE IT SPECIFIC. "dark" → what kind of dark? "magic" → what does it cost? "empire" → what cracked it first?
5. CONNECT IDEAS. When something the player says connects to something they said earlier, point it out. "That faction sounds like they would worship the god you mentioned earlier — is that intentional?"
6. OCCASIONAL WORLD SNAPSHOTS. Every 4-5 turns, write one short evocative paragraph describing a scene in the world as it exists so far — sensory, specific, alive. Then invite a reaction: "Does that feel right, or does something about it need to change?"
7. SHORT MESSAGES. 2-4 sentences of reaction/expansion + your one question. Never a wall of text.
8. NEVER say "I will note that down." Never output JSON. Just talk.
9. NEVER RUSH. Do not signal readiness before turn 12. You want a world that feels fully imagined, not a quick sketch.
10. When you have genuinely rich answers across: vibe/tone, magic or power system, danger/conflict, factions or power players, secrets, and culture/people — end your message with exactly: [READY_TO_BUILD]

Current turn: {TURN_NUMBER}
Areas with solid data so far: {GATHERED_FIELDS}`;

var COBUILD_BUILD_SYSTEM = `You are Vesper. You just had a world-building conversation with a player. Now extract everything into a structured world.

Return ONLY a valid JSON object with these keys (use everything from the conversation — fill in reasonable defaults for anything not discussed):
name, description, setting, climate, magic_level (None/Low/Medium/High/Extreme), technology_level (None/Low/Medium/High/Extreme), danger_level (None/Low/Medium/High/Extreme), population_density (Sparse/Moderate/Dense/Crowded), lore, factions, landmarks, rules_of_nature, gods_religion, languages_cultures, economy_resources, secrets_mysteries, tone_themes, world_feel

Make every field rich and specific. Do not use placeholder text. The description should be 4-5 vivid sentences. Lore should be 6-8 sentences. Everything else 3-5 sentences.`;

async function cobuildStart() {
  if (!state.apiKey) { state.screen = 'key'; state.keyRedirectMsg = 'Enter your OpenAI API key to build with Vesper.'; render(); return; }
  state.cobuildOpen = true;
  state.cobuildMessages = [];
  state.cobuildDraft = {};
  state.cobuildDone = false;
  state.cobuildThinking = false;
  // Pick a random opening
  var opening = COBUILD_OPENING[Math.floor(Math.random() * COBUILD_OPENING.length)];
  state.cobuildMessages.push({ role: 'vesper', text: opening });
  render();
}

async function cobuildSend(playerText) {
  if (!playerText.trim() || state.cobuildThinking) return;
  if (!state.apiKey) { state.screen = 'key'; state.keyRedirectMsg = 'Enter your OpenAI API key to build with Vesper.'; render(); return; }
  state.cobuildMessages.push({ role: 'player', text: playerText });
  state.cobuildThinking = true;
  render(); setTimeout(cobuildScrollToBottom, 50);

  // Turn count = number of player messages so far
  var turnNumber = state.cobuildMessages.filter(function(m){ return m.role === 'player'; }).length;

  // Build conversation history
  var history = state.cobuildMessages.map(function(m) {
    return (m.role === 'vesper' ? 'Vesper' : 'Player') + ': ' + m.text;
  }).join('\n\n');

  // Track which areas we have decent coverage on
  var gathered = cobuildAssessCoverage();
  var sys = COBUILD_SYSTEM
    .replace('{TURN_NUMBER}', turnNumber)
    .replace('{GATHERED_FIELDS}', gathered || 'none yet');

  try {
    var reply = await callAI(sys, history + '\n\nVesper:', 350);
    // Check for ready signal
    var isDone = reply.includes('[READY_TO_BUILD]');
    // Strip the tag from displayed message
    var displayReply = reply.replace('[READY_TO_BUILD]', '').trim();
    state.cobuildMessages.push({ role: 'vesper', text: displayReply });
    if (isDone) state.cobuildDone = true;
  } catch(e) {
    console.error('cobuildSend error:', e);
    state.cobuildMessages.push({ role: 'vesper', text: 'Something went wrong: ' + (e.message || String(e)) });
  }
  state.cobuildThinking = false;
  render(); setTimeout(cobuildScrollToBottom, 50);
}

function cobuildAssessCoverage() {
  // Look at player messages and flag which major areas have been touched
  var transcript = state.cobuildMessages.filter(function(m){ return m.role === 'player'; }).map(function(m){ return m.text.toLowerCase(); }).join(' ');
  var areas = [];
  if (/magic|spell|power|ability|mana|force|energy|ritual|curse/.test(transcript)) areas.push('magic/power system');
  if (/war|empire|kingdom|faction|clan|guild|politi|ruler|king|queen|leader/.test(transcript)) areas.push('factions/power');
  if (/danger|monster|threat|enemy|dark|death|surviv|predator|creature/.test(transcript)) areas.push('danger/conflict');
  if (/secret|hidden|mystery|ancient|forbidden|unknown|buried|truth/.test(transcript)) areas.push('secrets');
  if (/feel|vibe|tone|dark|light|grim|hope|cozy|horror|brutal|whimsical/.test(transcript)) areas.push('tone/vibe');
  if (/people|culture|race|religion|god|worship|belief|custom|tradition|language/.test(transcript)) areas.push('culture/people');
  if (/land|setting|geography|place|city|forest|mountain|sea|desert|underground/.test(transcript)) areas.push('world setting');
  return areas.join(', ') || 'none yet';
}

function cobuildScrollToBottom() {
  var el = document.getElementById('cobuild-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

async function cobuildFinalize() {
  state.cobuildThinking = true;
  state.cobuildDone = false;
  render();

  // Build full transcript
  var transcript = state.cobuildMessages.map(function(m) {
    return (m.role === 'vesper' ? 'Vesper: ' : 'Player: ') + m.text;
  }).join('\n\n');

  try {
    var raw = await callAI(COBUILD_BUILD_SYSTEM, 'Here is our world-building conversation:\n\n' + transcript + '\n\nNow build the world JSON:', 2200);
    var clean = raw.replace(/```json/gi,'').replace(/```/g,'').trim();
    var firstBrace = clean.indexOf('{');
    var lastBrace = clean.lastIndexOf('}');
    if (firstBrace !== -1 && lastBrace !== -1) {
      var json = JSON.parse(clean.slice(firstBrace, lastBrace + 1));
      var levels = ['None','Low','Medium','High','Extreme'];
      var densities = ['Sparse','Moderate','Dense','Crowded'];
      state.draftWorld = {
        name: json.name || 'Unnamed World',
        description: json.description || '',
        setting: json.setting || 'Fantasy',
        climate: json.climate || 'Temperate',
        magic_level: levels.indexOf(json.magic_level) !== -1 ? json.magic_level : 'Medium',
        technology_level: levels.indexOf(json.technology_level) !== -1 ? json.technology_level : 'Low',
        danger_level: levels.indexOf(json.danger_level) !== -1 ? json.danger_level : 'Medium',
        population_density: densities.indexOf(json.population_density) !== -1 ? json.population_density : 'Moderate',
        lore: json.lore || '',
        factions: formatImportField(json.factions),
        landmarks: formatImportField(json.landmarks),
        rules_of_nature: json.rules_of_nature || '',
        gods_religion: json.gods_religion || '',
        languages_cultures: json.languages_cultures || '',
        economy_resources: json.economy_resources || '',
        secrets_mysteries: formatImportField(json.secrets_mysteries),
        tone_themes: json.tone_themes || '',
        world_feel: json.world_feel || '',
        experience_mode: 'Narrative',
        world_type: 'private',
      };
      state.cobuildOpen = false;
      state.cobuildDone = false;
      state.screen = 'cobuildReview';
    } else {
      throw new Error('No JSON found');
    }
  } catch(e) {
    state.cobuildMessages.push({ role: 'vesper', text: 'I had trouble building the world JSON. Let\'s keep talking — tell me more about what you have in mind.' });
    state.cobuildDone = true;
  }
  state.cobuildThinking = false;
  render();
}

function attachCobuildEvents() {
  var overlay = document.getElementById('cobuild-overlay');
  if (!overlay) return;
  var closeBtn = document.getElementById('cobuild-close');
  if (closeBtn) closeBtn.addEventListener('click', function(){ state.cobuildOpen = false; render(); });
  var finalizeBtn = document.getElementById('cobuild-finalize');
  if (finalizeBtn) finalizeBtn.addEventListener('click', function(){ cobuildFinalize(); });
  var sendBtn = document.getElementById('cobuild-send');
  var inp = document.getElementById('cobuild-input');
  function doSend() {
    if (inp && inp.value.trim()) { cobuildSend(inp.value.trim()); inp.value = ''; }
  }
  if (sendBtn) sendBtn.addEventListener('click', doSend);
  if (inp) {
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); doSend(); } });
  }
  // Auto-scroll messages
  var msgs = document.getElementById('cobuild-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function formatImportField(val) {
  if (!val) return '';
  if (typeof val === 'string') return val;
  if (Array.isArray(val)) {
    return val.map(function(item) {
      if (typeof item === 'string') return item;
      if (typeof item === 'object') {
        // e.g. { name: 'X', description: 'Y', goal: 'Z' }
        var parts = [];
        if (item.name) parts.push(item.name);
        if (item.description) parts.push(item.description);
        if (item.goal) parts.push('Goal: ' + item.goal);
        if (item.significance) parts.push(item.significance);
        if (item.details) parts.push(item.details);
        if (item.location) parts.push(item.location);
        // fallback: any remaining string values
        if (parts.length === 0) {
          Object.keys(item).forEach(function(k){ if(typeof item[k]==='string') parts.push(item[k]); });
        }
        return parts.join(' — ');
      }
      return String(item);
    }).join('\n\n');
  }
  if (typeof val === 'object') {
    // Object with keys as faction/landmark names
    return Object.keys(val).map(function(k) {
      var v = val[k];
      if (typeof v === 'string') return k + ' — ' + v;
      if (typeof v === 'object') {
        var parts = [k];
        Object.keys(v).forEach(function(sk){ if(typeof v[sk]==='string') parts.push(v[sk]); });
        return parts.join(' — ');
      }
      return k + ': ' + String(v);
    }).join('\n\n');
  }
  return String(val);
}

async function importFictionalWorld(query) {
  if (!state.apiKey) { state.screen='key'; state.keyRedirectMsg = 'Enter your OpenAI API key to import worlds.'; render(); return; }
  state.importing = true; state.importError = null; render();

  var sys = `You are Vesper, a lore expert and world-building engine for a god-game called Aurora. Your task is to reconstruct a fictional universe with maximum canon accuracy — as if you are the author writing a game adaptation sourcebook. Do NOT invent generic fantasy details. Use REAL names, places, events, and mechanics from the source material.

RULES:
- name: Use the canonical world/setting name (e.g. "Middle-earth", "Westeros", "The Wizarding World of Harry Potter", "The Continent" for The Witcher)
- description: 3-4 sentences. Describe the world as a reader/viewer would recognize it — tone, feel, defining features, era. Name-drop iconic real elements.
- setting: The genre + physical nature of the world (e.g. "High Fantasy continent divided into Seven Kingdoms", "Desert planet Arrakis in a feudal interstellar empire", "Medieval Central European archipelago of monster-infested kingdoms")
- climate: Real climates from canon (e.g. "Frozen North beyond the Wall, arid Dorne, fertile Reach, tropical Summer Isles")
- magic_level: One of None|Low|Medium|High|Extreme — based on how central and powerful magic is in the story
- technology_level: One of None|Low|Medium|High|Extreme — based on actual tech in the universe
- danger_level: One of None|Low|Medium|High|Extreme — how lethal the world is for an average person
- population_density: One of Sparse|Moderate|Dense|Crowded
- lore: This is the MOST important field. 6-8 sentences minimum. Include: world origin myth or creation history, major historical wars or cataclysms, current political state, what drives conflict today, key canon events (named), the stakes. Name actual places, people, and events from the source. No vague summaries.
- factions: List 5-8 REAL named factions/houses/organizations from canon. For each: name, brief description, their goal or role. Format: "Name — description. Goal: X"
- landmarks: List 5-8 REAL named locations from canon. For each: name, what it is, why it matters. Format: "Name — description"
- rules_of_nature: Describe the actual magic system or power rules from canon (spells, the Force, Haki, chakra, Allomancy, etc.), any unique physics or biology, what governs death/life, gods or cosmic forces. Be specific — name the systems and their real rules.

Return ONLY a valid JSON object. No markdown fences, no extra text.`;

  var prompt = 'Generate a full canon-accurate Aurora world profile for: "' + query + '". Use real names, places, and lore from the actual source material. Return ONLY a JSON object.';

  try {
    var raw = await callAI(sys, prompt, 1400);
    var cleaned = raw.replace(/```json[\r\n]*/g,'').replace(/```[\r\n]*/g,'').trim();
    // Sometimes the model wraps in extra text — extract the JSON object
    var jsonStart = cleaned.indexOf('{');
    var jsonEnd = cleaned.lastIndexOf('}');
    if (jsonStart !== -1 && jsonEnd !== -1) cleaned = cleaned.slice(jsonStart, jsonEnd+1);
    var json = JSON.parse(cleaned);
    // Validate magic/tech/danger levels
    var levels = ['None','Low','Medium','High','Extreme'];
    var densities = ['Sparse','Moderate','Dense','Crowded'];
    state.draftWorld = Object.assign(freshWorld(), {
      name: json.name || query,
      description: json.description || '',
      setting: json.setting || '',
      climate: json.climate || '',
      magic_level: levels.indexOf(json.magic_level) !== -1 ? json.magic_level : 'Medium',
      technology_level: levels.indexOf(json.technology_level) !== -1 ? json.technology_level : 'Low',
      danger_level: levels.indexOf(json.danger_level) !== -1 ? json.danger_level : 'Medium',
      population_density: densities.indexOf(json.population_density) !== -1 ? json.population_density : 'Moderate',
      lore: json.lore || '',
      factions: formatImportField(json.factions),
      landmarks: formatImportField(json.landmarks),
      rules_of_nature: formatImportField(json.rules_of_nature),
      gods_religion: json.gods_religion || '',
      languages_cultures: json.languages_cultures || '',
      economy_resources: json.economy_resources || '',
      secrets_mysteries: formatImportField(json.secrets_mysteries),
      tone_themes: json.tone_themes || '',
      world_feel: json.world_feel || '',
      historical_events: json.historical_events || '',
      current_conflicts: json.current_conflicts || '',
      magic_law: json.magic_law || '',
      death_law: json.death_law || '',
      reality_law: json.reality_law || '',
      power_law: json.power_law || '',
      power_system_type: json.power_system_type || '',
      genre_tone: json.genre_tone || '',
      world_scale: json.world_scale || '',
      core_theme: json.core_theme || json.core_themes || '',
      world_type: 'known',
      experience_mode: 'Narrative',
    });
    state.importing = false;
    state.screen = 'createWorld';
    state.worldStep = 0;
    state.importQuery = '';
    state.aiSuggestion = null;
  } catch(e) {
    state.importing = false;
    state.importError = 'Could not parse world data. Try a more specific title, e.g. "Lord of the Rings" or "Naruto". (' + e.message + ')';
  }
  render();
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function attachImportWorldEvents() {
  var back = document.getElementById('btn-back-home');
  if (back) back.addEventListener('click', function() { state.screen='home'; state.importError=null; render(); });
  var inp = document.getElementById('import-query');
  if (inp) inp.addEventListener('input', function() { state.importQuery = inp.value; });
  var doImport = function() {
    var q = state.importQuery.trim() || (inp ? inp.value.trim() : '');
    if (!q || state.importing) return;
    state.importQuery = q;
    importFictionalWorld(q);
  };
  var btn = document.getElementById('btn-do-import');
  if (btn) btn.addEventListener('click', doImport);
  if (inp) inp.addEventListener('keydown', function(e){ if(e.key==='Enter') doImport(); });
  document.querySelectorAll('.world-pick').forEach(function(b){
    b.addEventListener('click', function(){
      state.importQuery = b.dataset.world;
      importFictionalWorld(b.dataset.world);
    });
  });
  document.querySelectorAll('.cat-tab').forEach(function(b){
    b.addEventListener('click', function(){
      state.importCategory = b.dataset.cat;
      render();
    });
  });
}

function attachAgentImportEvents() {
  var back = document.getElementById('btn-back-agent');
  var parse = document.getElementById('btn-parse-agent-json');
  var check = document.getElementById('btn-check-inbox');
  if(back) back.addEventListener('click', function(){ state.screen='home'; state.agentImportError=null; render(); });
  if(parse) parse.addEventListener('click', function(){
    var ta = document.getElementById('agent-json-input');
    if (!ta || !ta.value.trim()) { state.agentImportError = 'Paste a JSON world object or array first.'; render(); return; }
    try {
      var raw = ta.value.trim();
      var cleaned = raw.replace(/```json[\r\n]*/g,'').replace(/```[\r\n]*/g,'').trim();
      var parsed = JSON.parse(cleaned);
      var worlds = Array.isArray(parsed) ? parsed : (parsed.worlds ? parsed.worlds : [parsed]);
      if (worlds.length === 0) { state.agentImportError = 'No valid world objects found in JSON.'; render(); return; }
      var count = 0;
      worlds.forEach(function(w){ var r = agentImportWorld(w); if(r) count++; });
      state.agentImportError = null;
      state.agentImportNotice = count + ' world' + (count > 1 ? 's' : '') + ' imported successfully!';
      render();
      setTimeout(function(){ state.agentImportNotice = null; render(); }, 5000);
    } catch(e) {
      state.agentImportError = 'Invalid JSON: ' + e.message;
      render();
    }
  });
  if(check) check.addEventListener('click', function(){
    var n = checkAgentInbox();
    if (n > 0) {
      state.agentImportNotice = n + ' world' + (n > 1 ? 's' : '') + ' pulled from inbox!';
    } else {
      state.agentImportNotice = 'Inbox is empty or already processed.';
    }
    render();
    setTimeout(function(){ state.agentImportNotice = null; render(); }, 4000);
  });
}

function attachEditCanonWorldEvents() {
  var btnCancel = document.getElementById('btn-cancel-edit-canon');
  if (btnCancel) btnCancel.addEventListener('click', function(){ state.screen='worlds'; state.worldsTab='canon'; render(); });

  var btnSave = document.getElementById('btn-save-canon');
  if (btnSave) btnSave.addEventListener('click', function(){
    // Collect all field values from inputs/textareas/selects
    document.querySelectorAll('[data-key]').forEach(function(el){
      state.editCanonDraft[el.dataset.key] = el.value;
    });
    // Find the world record and update it in local state
    var w = state.worlds.find(function(w){ return w.world_type==='Canon'; });
    if (!w) { alert('Canon world not found.'); return; }
    var idx = state.worlds.indexOf(w);
    if (idx !== -1) state.worlds[idx] = Object.assign({}, w, state.editCanonDraft);
    save();
    state.screen = 'worlds';
    state.worldsTab = 'canon';
    render();
  });
}
