      // ── WORLD CONTRACT ─────────────────────────────────────────
      +'<div style="text-align:center;margin-bottom:24px">'

      +'<h2 style="font-size:1.5rem;font-weight:700;margin-bottom:4px">World Contract</h2>'
      +'<p style="color:#9ca3af;font-size:0.9rem">This is the binding agreement between you and your world. Once signed, the narrator is permanently bound by these rules.</p>'
      +'</div>'
      +(contractText
        ?'<div style="background:rgba(0,0,0,0.4);border:1px solid rgba(147,51,234,0.4);border-radius:16px;padding:20px;margin-bottom:20px;white-space:pre-line;font-size:0.82rem;color:#e5e7eb;line-height:1.7">'+esc(contractText)+'</div>'
        :'<div style="background:rgba(147,51,234,0.08);border:1px dashed rgba(147,51,234,0.3);border-radius:16px;padding:24px;text-align:center;margin-bottom:20px">'
         +'<button id="btn-gen-contract" style="background:linear-gradient(135deg,#7c3aed,#be185d);border:none;color:white;padding:12px 28px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer">✨ Generate World Contract</button>'
         +'<p style="color:#6b7280;font-size:0.78rem;margin-top:10px">Vesper will seal your world&#39;s rules into a binding narrative document.</p>'
         +'</div>')
      // World Stability
      +'<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:16px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<span style="font-size:0.875rem;color:#9ca3af;font-weight:600">⚖️ World Stability</span>'
      +'<span style="font-weight:700;color:'+stabilityColor+'">'+w.world_stability+'%</span>'
      +'</div>'
      +'<div style="background:rgba(255,255,255,0.05);border-radius:9999px;height:8px;overflow:hidden">'
      +'<div style="background:'+stabilityColor+';height:100%;width:'+w.world_stability+'%;border-radius:9999px;transition:width 0.3s"></div>'
      +'</div>'
      +'<p style="font-size:0.72rem;color:#6b7280;margin-top:8px">Stability drops when dungeons go uncleared, wars start, and gods are disturbed. It rises when threats are resolved.</p>'
      +'</div>'
      // Story Seeds
      +'<div style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><label style="font-size:0.875rem;color:#9ca3af;font-weight:500">🌱 Story Seeds</label><button id="btn-gen-seeds" style="background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;padding:5px 12px;border-radius:8px;font-size:0.75rem;cursor:pointer">Generate Seeds</button></div>'
      +(function(){
          var seeds = [];
          try { seeds = JSON.parse(w.story_seeds || '[]'); } catch(e){}
          if(seeds.length===0) return '<div style="color:#6b7280;font-size:0.8rem;font-style:italic">No story seeds yet. Generate some or just dive in.</div>';
          return seeds.map(function(s,i){
            return '<div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:12px;margin-bottom:8px">'
              +'<div style="font-weight:700;font-size:0.85rem;color:#6ee7b7;margin-bottom:3px">'+(i+1)+'. '+esc(s.title||s)+'</div>'
              +(s.desc?'<div style="font-size:0.78rem;color:#9ca3af">'+esc(s.desc)+'</div>':'')
              +'</div>';
          }).join('');
        })()
      +'</div>';
  }
  return '<div style="min-height:100vh;background:linear-gradient(135deg,#030712,#0d0520,#030712)">'
    +'<div style="border-bottom:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);padding:16px 24px;display:flex;align-items:center;gap:16px">'
    +'<button id="btn-back-worlds" style="background:none;border:none;color:#9ca3af;font-size:0.875rem;cursor:pointer">← Back</button>'
    +stepBarHtml(WORLD_STEPS,WORLD_ICONS,step)
    +'</div>'
    +'<div style="max-width:42rem;margin:0 auto;padding:40px 24px">'+stepTipHtml()+content
    +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:40px">'
    +(step>0?'<button id="btn-prev-step" style="background:rgba(255,255,255,0.1);border:none;color:white;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer">← Back</button>':'<div></div>')
    +(step<10?'<button id="btn-next-step" style="background:linear-gradient(to right,#9333ea,#ec4899);border:none;color:white;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer">Next →</button>'
       :'<button id="btn-save-world" style="background:linear-gradient(to right,#9333ea,#ec4899);border:none;color:white;padding:12px 32px;border-radius:12px;font-size:1.125rem;font-weight:700;cursor:pointer">✨ Create World</button>')
    +vesperChatHtml('world')+'</div></div></div>';
}
function attachCreateWorldEvents() {
  var bback=document.getElementById('btn-back-worlds'),bprev=document.getElementById('btn-prev-step'),bnext=document.getElementById('btn-next-step'),bsave=document.getElementById('btn-save-world');
  if(bback) bback.addEventListener('click',function(){state.screen='worlds';render();});
  document.querySelectorAll('.wtype-btn').forEach(function(b){
    b.addEventListener('click',function(){state.draftWorld.world_type=b.dataset.wtype;collectWorldStep();render();});
  });
  document.querySelectorAll('.contpos-btn').forEach(function(b){
    b.addEventListener('click',function(){state.draftWorld.continent_position=b.dataset.pos;collectWorldStep();render();});
  });
  if(bprev) bprev.addEventListener('click',function(){collectWorldStep();state.worldStep--;state.aiSuggestion=null;state.aiSuggestionField=null;state.aiTip=null;state.consistencyCheck=null;render();fetchStepTip();});
  if(bnext) bnext.addEventListener('click',function(){collectWorldStep();if(state.worldStep===0&&!state.draftWorld.name.trim()){alert('Please enter a world name!');return;}state.worldStep++;state.aiSuggestion=null;state.aiSuggestionField=null;state.aiTip=null;state.consistencyCheck=null;render();fetchStepTip();});
  if(bsave) bsave.addEventListener('click',function(){collectWorldStep();var w=Object.assign({},state.draftWorld,{id:Date.now().toString(),status:'Active',created_date:new Date().toISOString()});state.worlds.push(w);save();state.currentWorld=w;state.screen='worldDetail';render();});
  document.querySelectorAll('.sel-btn').forEach(function(b){b.addEventListener('click',function(){state.draftWorld[b.dataset.field]=b.dataset.val;render();});});
  document.querySelectorAll('.world-slider').forEach(function(s){s.addEventListener('input',function(){var o=s.dataset.opts.split('|');state.draftWorld[s.dataset.field]=o[parseInt(s.value)];render();});});
  document.querySelectorAll('.mode-btn').forEach(function(b){b.addEventListener('click',function(){state.draftWorld.experience_mode=b.dataset.mode;render();});});
  document.querySelectorAll('.psys-btn').forEach(function(b){b.addEventListener('click',function(){state.draftWorld.power_system_type=b.dataset.psys;render();});});
  document.querySelectorAll('.genre-btn').forEach(function(b){b.addEventListener('click',function(){state.draftWorld.genre_tone=b.dataset.genre;render();});});
  document.querySelectorAll('.scale-btn').forEach(function(b){b.addEventListener('click',function(){state.draftWorld.world_scale=b.dataset.scale;render();});});
  document.querySelectorAll('.theme-btn').forEach(function(b){b.addEventListener('click',function(){
    var themes=state.draftWorld.core_theme||'';
    var arr=themes?themes.split(',').map(function(x){return x.trim();}).filter(Boolean):[];
    var t=b.dataset.theme; var idx=arr.indexOf(t);
    if(idx===-1){arr.push(t);}else{arr.splice(idx,1);}
    state.draftWorld.core_theme=arr.join(', ');
    render();
  });});
  document.querySelectorAll('.tone-btn').forEach(function(b){b.addEventListener('click',function(){
    collectWorldStep();
    var t=b.dataset.tone; var tones=state.draftWorld.tone_themes||'';
    var arr=tones?tones.split(',').map(function(x){return x.trim();}).filter(Boolean):[];
    var idx=arr.indexOf(t);
    if(idx===-1){arr.push(t);}else{arr.splice(idx,1);}
    state.draftWorld.tone_themes=arr.join(', ');
    render();
  });});
  document.querySelectorAll('.ai-assist-btn').forEach(function(b){b.addEventListener('click',function(){collectWorldStep();aiAssistWorld(b.dataset.assistType);});});

  // Add faction
  var baf=document.getElementById('btn-add-faction');
  if(baf) baf.addEventListener('click',function(){
    collectWorldStep();
    var factions=[];try{factions=state.draftWorld.factions?JSON.parse(state.draftWorld.factions):[];}catch(e){}
    factions.push({name:'New Faction',goal:'',leader:'',territory:'',allies:'',enemies:''});
    state.draftWorld.factions=JSON.stringify(factions);render();
  });
  // Remove faction
  document.querySelectorAll('.btn-remove-faction').forEach(function(b){b.addEventListener('click',function(){
    collectWorldStep();
    var fi=parseInt(b.dataset.fi);var factions=[];try{factions=state.draftWorld.factions?JSON.parse(state.draftWorld.factions):[];}catch(e){}
    factions.splice(fi,1);state.draftWorld.factions=JSON.stringify(factions);render();
  });});
  // Add race
  var bar=document.getElementById('btn-add-race');
  if(bar) bar.addEventListener('click',function(){
    collectWorldStep();
    var races=[];try{races=state.draftWorld.races?JSON.parse(state.draftWorld.races):[];}catch(e){}
    races.push({name:'New Race',description:'',traits:'',culture:'',lifespan:'',playable:true});
    state.draftWorld.races=JSON.stringify(races);render();
  });
  // Remove race
  document.querySelectorAll('.btn-remove-race').forEach(function(b){b.addEventListener('click',function(){
    collectWorldStep();
    var ri=parseInt(b.dataset.ri);var races=[];try{races=state.draftWorld.races?JSON.parse(state.draftWorld.races):[];}catch(e){}
    races.splice(ri,1);state.draftWorld.races=JSON.stringify(races);render();
  });});
  // Expand My Idea button
  var bRandom = document.getElementById('btn-random-world');
  if(bRandom) bRandom.addEventListener('click', function(){ collectWorldStep(); generateRandomWorld(); });
  var bExpand = document.getElementById('btn-expand-world');
  if (bExpand) bExpand.addEventListener('click', function() { state.showExpandOverlay = true; render(); attachCreateWorldEvents(); });
  // Expand overlay controls
  var bExpandCancel = document.getElementById('btn-expand-cancel');
  if (bExpandCancel) bExpandCancel.addEventListener('click', function() { state.showExpandOverlay = false; render(); });
  var expandInput = document.getElementById('expand-prompt-input');
  if (expandInput) expandInput.addEventListener('input', function() { state.expandPrompt = expandInput.value; });
  var bExpandGo = document.getElementById('btn-expand-go');
  var doExpand = function() {
    var q = state.expandPrompt.trim() || (expandInput ? expandInput.value.trim() : '');
    if (!q || state.expandingWorld) return;
    state.expandPrompt = q;
    expandWorldFromConcept(q);
  };
  if (bExpandGo) bExpandGo.addEventListener('click', doExpand);
  if (expandInput) expandInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && e.ctrlKey) doExpand(); });
  document.querySelectorAll('.expand-example').forEach(function(b) {
    b.addEventListener('click', function() {
      state.expandPrompt = b.dataset.ex;
      if (expandInput) expandInput.value = b.dataset.ex;
    });
  });
  var bcc=document.getElementById('btn-consistency-check');
  if(bcc) bcc.addEventListener('click',function(){runConsistencyCheck();});
  var bgc=document.getElementById('btn-gen-contract');
  if(bgc) bgc.addEventListener('click',function(){aiGenerateWorldContract();});
  var bgs=document.getElementById('btn-gen-seeds');
  if(bgs) bgs.addEventListener('click',function(){aiGenerateStorySeeds();});
  
  // Genre buttons (step 7)
  document.querySelectorAll('.genre-btn').forEach(function(b){
    b.addEventListener('click',function(){
      state.draftWorld.genre_tone = b.dataset.genre;
      render();
    });
  });
  
  // Scale buttons (step 7)
  document.querySelectorAll('.scale-btn').forEach(function(b){
    b.addEventListener('click',function(){
      state.draftWorld.world_scale = b.dataset.scale;
      render();
    });
  });
  
  // Theme buttons (step 7)
  document.querySelectorAll('.theme-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var themes = state.draftWorld.tone_themes ? state.draftWorld.tone_themes.split(',').map(t=>t.trim()) : [];
      var idx = themes.indexOf(b.dataset.theme);
      if(idx===-1) themes.push(b.dataset.theme);
      else themes.splice(idx,1);
      state.draftWorld.tone_themes = themes.join(', ');
      render();
    });
  });
  
  // Tone buttons (step 6)
  document.querySelectorAll('.tone-btn').forEach(function(b){
    b.addEventListener('click',function(){
      state.draftWorld.tone = b.dataset.tone;
      render();
    });
  });
  attachVesperEvents('world');
  var ba=document.getElementById('btn-apply-suggest'),bd=document.getElementById('btn-dismiss-suggest');
  if(ba) ba.addEventListener('click',applyAiSuggestion);
  if(bd) bd.addEventListener('click',function(){state.aiSuggestion=null;state.aiSuggestionField=null;render();});
}
function collectWorldStep() {
  var n=document.getElementById('world-name');if(n)state.draftWorld.name=n.value;
  var eu=document.getElementById('world-echo-url');if(eu)state.draftWorld.echo_narrative_story_url=eu.value;
  var d=document.getElementById('world-desc');if(d)state.draftWorld.description=d.value;
  // Collect faction cards (JSON) or fall back to textarea
  var factionCards=document.querySelectorAll('.faction-card');
  if(factionCards.length>0){
    var fArr=[];
    factionCards.forEach(function(card){
      var nm=card.querySelector('.faction-name'),gl=card.querySelector('.faction-goal'),
          ld=card.querySelector('.faction-leader'),tr=card.querySelector('.faction-territory'),
          rl=card.querySelector('.faction-relations');
      fArr.push({name:nm?nm.value:'',goal:gl?gl.value:'',leader:ld?ld.value:'',territory:tr?tr.value:'',allies:rl?rl.value:'',enemies:''});
    });
    state.draftWorld.factions=JSON.stringify(fArr);
  } else { var f=document.getElementById('world-factions');if(f)state.draftWorld.factions=f.value; }
  // Collect race cards (JSON)
  var raceCards=document.querySelectorAll('.race-card');
  if(raceCards.length>0){
    var rArr=[];
    raceCards.forEach(function(card){
      var nm=card.querySelector('.race-name'),ds=card.querySelector('.race-desc'),
          tr=card.querySelector('.race-traits'),cu=card.querySelector('.race-culture'),
          li=card.querySelector('.race-lifespan'),pl=card.querySelector('.race-playable');
      rArr.push({name:nm?nm.value:'',description:ds?ds.value:'',traits:tr?tr.value:'',culture:cu?cu.value:'',lifespan:li?li.value:'',playable:pl?pl.checked:false});
    });

  }

function attachCreateCharEvents() {
  var bb=document.getElementById('btn-back-char'),bp=document.getElementById('btn-char-prev'),bn=document.getElementById('btn-char-next'),bs=document.getElementById('btn-save-char');
  if(bb) bb.addEventListener('click',function(){state.screen='worldDetail';render();});
  if(bp) bp.addEventListener('click',function(){collectCharStep();state.charStep--;render();});
  if(bn) bn.addEventListener('click',function(){collectCharStep();if(state.charStep===0&&!state.draftChar.name.trim()){alert('Enter a character name!');return;}state.charStep++;render();});
  if(bs) bs.addEventListener('click',function(){collectCharStep();applyMasteryForLevel(state.draftChar);var ch=Object.assign({},state.draftChar,{id:Date.now().toString()});state.characters.push(ch);save();state.currentChar=ch;state.screen='play';startGame();});
  document.querySelectorAll('.preset-btn').forEach(function(b){b.addEventListener('click',function(){var cls=b.dataset.cls,p=CLASS_PRESETS[cls];state.draftChar.class=cls;if(p){var st={};['STR','DEX','CON','INT','WIS','CHA'].forEach(function(s){st[s]=p[s]||50;});state.draftChar.stats=st;}render();});});
  document.querySelectorAll('.scenario-example-btn').forEach(function(b){b.addEventListener('click',function(){var sc=document.getElementById('char-scenario');if(sc){sc.value=b.dataset.ex;state.draftChar.starting_scenario=b.dataset.ex;}});});
  document.querySelectorAll('.align-btn').forEach(function(b){b.addEventListener('click',function(){state.draftChar.alignment=b.dataset.align;render();});});
  document.querySelectorAll('.prog-btn').forEach(function(b){b.addEventListener('click',function(){state.draftChar.progression_mode=b.dataset.mode;render();});});
  var lvS=document.getElementById('char-level'),lvD=document.getElementById('level-display');
  if(lvS){lvS.addEventListener('input',function(){state.draftChar.level=parseInt(lvS.value)||1;if(lvD)lvD.textContent='Lv '+lvS.value;});}
  document.querySelectorAll('.stat-slider').forEach(function(sl){sl.addEventListener('input',function(){if(!state.draftChar.stats)state.draftChar.stats={};state.draftChar.stats[sl.dataset.stat]=parseInt(sl.value)||10;});});
  document.querySelectorAll('.mastery-slider').forEach(function(sl){sl.addEventListener('input',function(){if(!state.draftChar.mastery)state.draftChar.mastery={};state.draftChar.mastery[sl.dataset.stat]=parseInt(sl.value)||10;});});
  attachVesperEvents('char');
  document.querySelectorAll('.vesper-chip').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.vesperOpen=true;render();
      setTimeout(function(){
        var inp=document.getElementById('vesper-input');
        if(inp){inp.value=btn.dataset.q;}
        var send=document.getElementById('btn-vesper-send');
        if(send) send.click();
      },100);
    });
  });
  // Race selection
  document.querySelectorAll('.race-select-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.draftChar.race = btn.dataset.race;
      state.draftChar.race_traits = btn.dataset.traits || '';
      render();
    });
  });
  // Origin selection
  document.querySelectorAll('.origin-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      collectCharStep();
      state.draftChar.origin = btn.dataset.origin;
      render();
    });
  });
  // Flaw selection
  document.querySelectorAll('.flaw-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      collectCharStep();
      state.draftChar.flaw = btn.dataset.flaw;
      state.draftChar.flaw_detail = btn.dataset.mechanic || '';
      render();
    });
  });
  // Collect origin detail / flaw detail textareas
  var charOriginDet = document.getElementById('char-origin-detail');
  if(charOriginDet) charOriginDet.addEventListener('input',function(){ state.draftChar.origin_detail=charOriginDet.value; });
  var charFlawDet = document.getElementById('char-flaw-detail');
  if(charFlawDet) charFlawDet.addEventListener('input',function(){ state.draftChar.flaw_detail=charFlawDet.value; });
  // AI generators
  var btnGenStats = document.getElementById('btn-ai-gen-stats');
  if(btnGenStats) btnGenStats.addEventListener('click', function(){ collectCharStep(); aiGenerateStats(); });
  var btnGenAb = document.getElementById('btn-ai-gen-abilities');
  if(btnGenAb) btnGenAb.addEventListener('click', function(){ collectCharStep(); aiGenerateAbilities(); });
  var btnGenIt = document.getElementById('btn-ai-gen-items');
  if(btnGenIt) btnGenIt.addEventListener('click', function(){ collectCharStep(); aiGenerateItems(); });
}
function collectCharStep() {
  var n=document.getElementById('char-name');if(n)state.draftChar.name=n.value;
  var b=document.getElementById('char-backstory');if(b)state.draftChar.backstory=b.value;
  var l=document.getElementById('char-location');if(l)state.draftChar.current_location=l.value;
  var a=document.getElementById('char-abilities');if(a)state.draftChar.abilities=a.value;
  var iv=document.getElementById('char-inventory');if(iv)state.draftChar.inventory=iv.value;
  var sc=document.getElementById('char-scenario');if(sc)state.draftChar.starting_scenario=sc.value;
  var lv=document.getElementById('char-level');if(lv)state.draftChar.level=parseInt(lv.value)||1;
  document.querySelectorAll('.stat-slider').forEach(function(sl){if(!state.draftChar.stats)state.draftChar.stats={};state.draftChar.stats[sl.dataset.stat]=parseInt(sl.value)||10;});
  document.querySelectorAll('.mastery-slider').forEach(function(sl){if(!state.draftChar.mastery)state.draftChar.mastery={};state.draftChar.mastery[sl.dataset.stat]=parseInt(sl.value)||10;});
  // Collect ability cards
  var abilityCards = document.querySelectorAll('.ability-card-data');
  if(abilityCards.length > 0){
    var abArr = [];
    abilityCards.forEach(function(card){ try { abArr.push(JSON.parse(card.dataset.ability)); } catch(e){} });
    state.draftChar.ability_cards = abArr;
    state.draftChar.abilities = abArr.map(function(ab){ return ab.name + (ab.mastery_stat?' ['+ab.mastery_stat+']':''); }).join(', ');
  }
  // Collect item cards
  var itemCards = document.querySelectorAll('.item-card-data');
  if(itemCards.length > 0){
    var itArr = [];
    itemCards.forEach(function(card){ try { itArr.push(JSON.parse(card.dataset.item)); } catch(e){} });
    state.draftChar.item_cards = itArr;
  }
  // Collect origin & flaw (set via button clicks, just ensure textarea custom values are captured)
  var fd=document.getElementById('char-flaw-detail');if(fd)state.draftChar.flaw_detail=fd.value;
  var co=document.getElementById('char-custom-origin');if(co&&co.value.trim()){state.draftChar.origin='custom';state.draftChar.origin_detail=co.value.trim();}
}

// AI stat generator — builds stats from class + backstory + race + level
async function aiGenerateStats() {
  var c = state.draftChar, w = state.currentWorld;
  if(!c.name && !c.class) return;
  var btn = document.getElementById('btn-ai-gen-stats');
  if(btn){ btn.textContent = '⏳ Generating...'; btn.disabled = true; }
  var prompt = 'Generate balanced RPG stats for this character. Return ONLY valid JSON, no markdown.\n\nCharacter: '+c.name+' | Class: '+c.class+' | Level: '+(c.level||1)+'\n'+(c.race?'Race: '+c.race+'\n':'')+(c.backstory?'Backstory: '+c.backstory.slice(0,200)+'\n':'')+'World: '+(w?w.name+' | Magic: '+w.magic_level+' | Danger: '+w.danger_level:'Unknown')+'\n\nRules:\n- Stats use scale 10-200 (E:10-40, D:41-70, C:71-110, B:111-150, A:151-200)\n- Level '+(c.level||1)+' character, scale appropriately\n- Class defines primary stats\n- Backstory influences secondary stats\n- Mastery is lower than stats\n- Return: {"STR":X,"DEX":X,"CON":X,"INT":X,"WIS":X,"CHA":X,"SMY":X,"mastery":{"STR":X,"DEX":X,"CON":X,"INT":X,"WIS":X,"CHA":X,"SMY":X},"reasoning":"one sentence why"}';
  try {
    var raw = await callAI('You are an RPG stat generator. Return ONLY valid JSON.', prompt, 400);
    var parsed = JSON.parse(raw.replace(/```json[\r\n]*/g,'').replace(/```[\r\n]*/g,'').trim());
    state.draftChar.stats = {STR:parsed.STR,DEX:parsed.DEX,CON:parsed.CON,INT:parsed.INT,WIS:parsed.WIS,CHA:parsed.CHA,SMY:parsed.SMY||50};
    state.draftChar.mastery = parsed.mastery || state.draftChar.mastery;
    state.draftChar.aiStatReasoning = parsed.reasoning || '';
    render();
  } catch(e) {
    if(btn){ btn.textContent = '✨ AI Generate Stats'; btn.disabled = false; }
  }
}

  try {
    var raw = await callAI('You are an RPG ability designer. Return ONLY valid JSON.', prompt, 600);
    var parsed = JSON.parse(raw.replace(/```json[\r\n]*/g,'').replace(/```[\r\n]*/g,'').trim());
    state.draftChar.ability_cards = parsed;

// ── AGENT INBOX ────────────────────────────────────────────────────────────────
var INBOX_KEY = 'aurora_agent_inbox';

// Called by external agents or scripts: window.auroraAgentImport({worlds:[...]})
// agentImportWorld — used by paste JSON handler
function agentImportWorld(json) {
  try {
    var w = normalizeImportedWorld(json);
    var existing = state.worlds.findIndex(function(x){ return x.name === w.name; });
    if(existing !== -1) {
      // Update existing world
      state.worlds[existing] = Object.assign(state.worlds[existing], w);
    } else {
      state.worlds.push(w);
    }
    saveState();
    return true;
  } catch(e) {
    console.error('[Aurora] agentImportWorld failed:', e);
    return false;
  }
}

window.auroraAgentImport = function(payload) {
  try {
    var inbox = JSON.parse(localStorage.getItem(INBOX_KEY) || '[]');
    var entry = {
      id: 'inbox_' + Date.now(),
      received: new Date().toISOString(),
      agent_name: payload.agent_name || 'Unknown Agent',
      worlds: Array.isArray(payload.worlds) ? payload.worlds : (payload.world ? [payload.world] : []),
      processed: false
    };
    inbox.push(entry);
    localStorage.setItem(INBOX_KEY, JSON.stringify(inbox));
    console.log('[Aurora] Agent inbox: received', entry.worlds.length, 'world(s) from', entry.agent_name);
    return entry.worlds.length;
  } catch(e) {
    console.error('[Aurora] Inbox write failed:', e);
    return 0;
  }
};

// Check inbox and import any unprocessed worlds
function checkAgentInbox() {
  try {
    var inbox = JSON.parse(localStorage.getItem(INBOX_KEY) || '[]');
    var unprocessed = inbox.filter(function(e){ return !e.processed; });
    if(unprocessed.length === 0) return 0;
    var imported = 0;
    unprocessed.forEach(function(entry) {
      (entry.worlds || []).forEach(function(worldData) {
        // Use the same import logic as manual JSON import
        try {
          var w = normalizeImportedWorld(worldData);
          var existing = state.worlds.findIndex(function(x){ return x.name === w.name; });
          if(existing === -1) {
            state.worlds.push(w);
            imported++;
          }
        } catch(e2) {
          console.warn('[Aurora] Inbox world import failed:', e2);
        }
      });
      entry.processed = true;
    });
    if(imported > 0) {
      localStorage.setItem(INBOX_KEY, JSON.stringify(inbox));
      saveState();
    }
    return imported;
  } catch(e) {
    console.error('[Aurora] checkAgentInbox failed:', e);
    return 0;
  }
}

// Normalize raw world JSON from agent into Aurora world object
function normalizeImportedWorld(json) {
  var id = 'world_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
  var levels = ['None','Low','Medium','High','Extreme'];
  var densities = ['Empty','Sparse','Moderate','Dense','Teeming'];
  function fmt(v){ return Array.isArray(v) ? v.join('\n') : (v || ''); }
  return {
    id: id,
    name: json.name || 'Unnamed World',
    description: json.description || '',
    setting: json.setting || 'Fantasy',
    climate: json.climate || 'Temperate',
    magic_level: levels.indexOf(json.magic_level) !== -1 ? json.magic_level : 'Medium',
    technology_level: levels.indexOf(json.technology_level) !== -1 ? json.technology_level : 'Low',
    danger_level: levels.indexOf(json.danger_level) !== -1 ? json.danger_level : 'Medium',
    population_density: densities.indexOf(json.population_density) !== -1 ? json.population_density : 'Moderate',
    lore: json.lore || '',
    factions: fmt(json.factions),
    landmarks: fmt(json.landmarks),
    rules_of_nature: fmt(json.rules_of_nature) || json.rules_of_nature || '',
    gods_religion: json.gods_religion || '',
    languages_cultures: json.languages_cultures || '',
    economy_resources: json.economy_resources || '',
    secrets_mysteries: fmt(json.secrets_mysteries),
    tone_themes: json.tone_themes || '',
    world_feel: json.world_feel || '',
    historical_events: json.historical_events || '',
    current_conflicts: json.current_conflicts || '',
    magic_law: json.magic_law || '',
    death_law: json.death_law || '',
    reality_law: json.reality_law || '',
    power_law: json.power_law || '',
    power_system_type: json.power_system_type || '',
    rank_names: json.rank_names || '',
    genre_tone: json.genre_tone || '',
    world_scale: json.world_scale || '',
    core_theme: json.core_theme || json.core_themes || '',
    experience_mode: json.experience_mode || 'Narrative',
    world_type: json.world_type || 'private',
    status: 'Active',
    world_stability: json.world_stability || 100,
    cover_image: json.cover_image || '',
    echo_narrative_story_url: json.echo_narrative_story_url || ''
  };
}

  return (state.devMode ? renderDevPanel() : '') + (state.deathScreen ? renderDeathScreen() : '')

    +'<div style="border-bottom:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.5);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">'

    +'<div><div style="font-weight:700;font-size:0.875rem">📖 '+esc(w.name)+(state.inCombat?' <span style="font-size:0.7rem;background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.3);padding:2px 8px;border-radius:9999px">⚔️ COMBAT</span>':'')+'</div>'
    +'<div style="font-size:0.75rem;color:#a855f7">'+esc(c.name)+' · '+esc(c.class)+' · <span id="btn-dev-secret" style="cursor:default;user-select:none" title="">Turn '+state.turnCount+'</span>'+(state.devTapCount>0&&state.devTapCount<4?'<span style="font-size:0.55rem;color:rgba(147,51,234,0.4);margin-left:3px">'+'●'.repeat(state.devTapCount)+'</span>':'')+'</div></div></div>'

    +(w&&w.echo_narrative_story_url?'<a id="btn-echo-narrative" href="'+w.echo_narrative_story_url+'" target="_blank" style="font-size:0.75rem;background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.3);color:#fbbf24;padding:5px 10px;border-radius:9999px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:3px" title="Open EchoNarrative lore">📖 Lore</a>':'')
    +'<button id="btn-save-chap" style="font-size:0.75rem;background:rgba(255,255,255,0.1);border:none;color:white;padding:5px 10px;border-radius:9999px;cursor:pointer">💾</button>'
    +'<button id="btn-toggle-stats" style="font-size:0.75rem;background:'+(state.showStats?'rgba(147,51,234,0.3)':'rgba(255,255,255,0.1)')+';border:none;color:white;padding:5px 10px;border-radius:9999px;cursor:pointer">📊</button>'
    +'<button id="btn-toggle-crafting" style="font-size:0.75rem;background:'+(state.showCrafting?'rgba(124,58,237,0.3)':'rgba(255,255,255,0.1)')+';border:none;color:white;padding:5px 10px;border-radius:9999px;cursor:pointer">⚒️</button>'
    +'<button id="btn-toggle-inv" style="font-size:0.75rem;background:'+(state.showInventory?'rgba(250,204,21,0.2)':'rgba(255,255,255,0.1)')+';border:none;color:white;padding:5px 10px;border-radius:9999px;cursor:pointer">🎒 <span style=\'color:#facc15\'>'+state.gold+'g</span></button>'
    +'<button id="btn-toggle-journal" style="font-size:0.75rem;background:'+(state.showJournal?'rgba(147,51,234,0.3)':'rgba(255,255,255,0.1)')+';border:none;color:white;padding:5px 12px;border-radius:9999px;cursor:pointer">📖 Journal'+journalBadge+'</button>'
    +'<button id="btn-toggle-codex" style="font-size:0.75rem;background:'+(state.showCodex?'rgba(16,185,129,0.3)':'rgba(255,255,255,0.1)')+';border:none;color:white;padding:5px 12px;border-radius:9999px;cursor:pointer">📚 Codex</button>'
    +(state.currentWorld&&state.currentWorld.world_stability!==undefined?'<span style="font-size:0.65rem;color:'+(state.currentWorld.world_stability>=80?'#4ade80':state.currentWorld.world_stability>=50?'#fbbf24':'#f87171')+'">⚖️ '+state.currentWorld.world_stability+'%</span>':'')
    +'<button id="btn-toggle-lore-fix" title="Correct a lore inconsistency" style="font-size:0.75rem;background:'+(state.showLoreFix?'rgba(239,68,68,0.3)':'rgba(255,255,255,0.1)')+';border:none;color:white;padding:5px 10px;border-radius:9999px;cursor:pointer">✏️ Lore'+(state.loreCorrections&&state.loreCorrections.length>0?'<span style="background:#ef4444;color:white;border-radius:9999px;padding:0 5px;font-size:0.65rem;margin-left:4px">'+state.loreCorrections.length+'</span>':'')+'</button>'
    +'</div></div>'
    +statsBar+combatBars
    // Lore Correction Panel
    +(state.showLoreFix ? renderLoreFixPanel() : '')
    // Messages
    +'<div id="messages-scroll" style="flex:1;overflow-y:auto;padding:24px 16px">'
    +'<div style="max-width:42rem;margin:0 auto">'+msgs+typing+summarizing+'<div id="messages-end"></div></div>'
    +'</div>'
    // Quick actions
    +'<div style="border-top:1px solid rgba(255,255,255,0.05);padding:8px 16px;flex-shrink:0;overflow-x:auto">'
    +'<div style="max-width:42rem;margin:0 auto;display:flex;gap:8px">'+actions+'</div></div>'

    +'<div style="border-top:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.4);padding:12px 16px 14px;flex-shrink:0">'

    // Mode hint bar
    +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">'

    +'<button id="btn-mode-speech" style="font-size:0.68rem;padding:3px 10px;border-radius:9999px;border:1px solid '+(state.inputMode==='speech'?'rgba(96,165,250,0.6)':'rgba(255,255,255,0.1)')+';background:'+(state.inputMode==='speech'?'rgba(96,165,250,0.15)':'transparent')+';color:'+(state.inputMode==='speech'?'#60a5fa':'#6b7280')+';cursor:pointer;font-weight:600">💬 Speak</button>'
    +'<span style="font-size:0.65rem;color:#374151;margin-left:4px">'+(state.inputMode==='action'?'Narrate actions · wrap dialogue in [ ]':'Your character speaks · wrap actions in ( )')+'</span>'
    +'</div>'
    // Textarea + send
    +'<div style="display:flex;gap:10px">'
    +'<textarea id="play-input" rows="2" placeholder="'
    +(state.inputMode==='action'
      ? (state.inCombat ? 'Describe your attack... use [speech in brackets]' : 'Narrate your action... use [speech in brackets]')
      : (state.inCombat ? 'Shout a battle cry... wrap actions in (parentheses)' : 'Say something... wrap actions in (parentheses)')
    )+'" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:11px 14px;color:white;font-size:0.875rem;outline:none;resize:none"></textarea>'
    +'<button id="btn-send" '+(state.loading?'disabled':'')+' style="align-self:flex-end;background:linear-gradient(to right,#9333ea,#ec4899);border:none;color:white;padding:11px 18px;border-radius:12px;font-weight:600;cursor:pointer;opacity:'+(state.loading?'0.4':'1')+'">'+(state.loading?'...':'→')+'</button>'
    +'</div></div></div></div>';
}

function attachPlayEvents() {
  // Wire copy buttons on narrator messages
  document.querySelectorAll('.copy-msg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var text = btn.getAttribute('data-text') || '';
      // Decode html entities back to plain text
      var tmp = document.createElement('textarea');
      tmp.innerHTML = text;
      navigator.clipboard.writeText(tmp.value).then(function() {
        btn.textContent = '✅ Copied!';
        btn.style.color = '#4ade80';
        setTimeout(function() { btn.textContent = '📋 Copy'; btn.style.color = '#6b7280'; }, 2000);
      }).catch(function() {
        btn.textContent = '❌ Failed';
        setTimeout(function() { btn.textContent = '📋 Copy'; btn.style.color = '#6b7280'; }, 2000);
      });
    });
  });

  var ex=document.getElementById('btn-exit-play'),sc=document.getElementById('btn-save-chap'),ts=document.getElementById('btn-toggle-stats'),tj=document.getElementById('btn-toggle-journal'),send=document.getElementById('btn-send'),inp=document.getElementById('play-input'),cj=document.getElementById('btn-close-journal');
  // Secret 4-tap dev unlock — click "Turn N" text 4 times within 3 seconds
  var devSecret = document.getElementById('btn-dev-secret');
  if (devSecret) {
    devSecret.addEventListener('click', function(e) {
      e.stopPropagation();
      if (state.devTapTimer) clearTimeout(state.devTapTimer);
      state.devTapCount = (state.devTapCount || 0) + 1;
      if (state.devTapCount >= 4) {
        state.devTapCount = 0;
        state.devTapTimer = null;
        state.devMode = !state.devMode;
        render();
        return;
      }
      // Reset tap count after 3 seconds of inactivity
      state.devTapTimer = setTimeout(function() {
        state.devTapCount = 0;
        render();
      }, 3000);
      render();
    });
  }
  if(ex) ex.addEventListener('click',function(){state.screen='worldDetail';render();});
  if(sc) sc.addEventListener('click',function(){var last=state.messages.filter(function(m){return m.role==='narrator';}).pop();saveChapter(last?last.text:'Start of journey.');});
  if(ts) ts.addEventListener('click',function(){state.showStats=!state.showStats;render();scrollToBottom();});
  var tcr=document.getElementById('btn-toggle-crafting');
  if(tcr) tcr.addEventListener('click',function(){ state.showCrafting=!state.showCrafting; render(); });
  if(tj) tj.addEventListener('click',function(){state.showJournal=!state.showJournal;render();scrollToBottom();});
  var tc=document.getElementById('btn-toggle-codex'),cc=document.getElementById('btn-close-codex');
  if(tc) tc.addEventListener('click',function(){state.showCodex=!state.showCodex;render();scrollToBottom();});
  if(cc) cc.addEventListener('click',function(){state.showCodex=false;render();});
  if(cj) cj.addEventListener('click',function(){state.showJournal=false;render();scrollToBottom();});
  // Lore Correction panel
  var tlf = document.getElementById('btn-toggle-lore-fix');
  if(tlf) tlf.addEventListener('click', function(){ state.showLoreFix = !state.showLoreFix; render(); });
  var clf = document.getElementById('btn-close-lore-fix');
  if(clf) clf.addEventListener('click', function(){ state.showLoreFix = false; render(); });
  var addCorr = document.getElementById('btn-add-correction');
  if(addCorr) addCorr.addEventListener('click', function(){
    var inp2 = document.getElementById('lore-fix-input');
    var val = inp2 ? inp2.value.trim() : '';
    if (!val) return;
    if (!state.loreCorrections) state.loreCorrections = [];
    state.loreCorrections.push(val);
    localStorage.setItem('aurora_lore_corrections_' + (state.currentWorld ? state.currentWorld.id : 'global'), JSON.stringify(state.loreCorrections));
    inp2.value = '';
    render();
  });
  // Allow Enter key to add correction
  var loreInp = document.getElementById('lore-fix-input');
  if(loreInp) loreInp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ var addBtn=document.getElementById('btn-add-correction'); if(addBtn) addBtn.click(); } });
  // Remove individual corrections
  document.querySelectorAll('.btn-remove-correction').forEach(function(btn){
    btn.addEventListener('click', function(){
      var i = parseInt(btn.getAttribute('data-i'));
      state.loreCorrections.splice(i, 1);
      localStorage.setItem('aurora_lore_corrections_' + (state.currentWorld ? state.currentWorld.id : 'global'), JSON.stringify(state.loreCorrections));
      render();
    });
  });
  // Inventory + Shop
  var ti=document.getElementById('btn-toggle-inv');
  if(ti) ti.addEventListener('click',function(){state.showInventory=!state.showInventory;if(!state.showInventory)state.showShop=false;render();});
  var ci=document.getElementById('btn-close-inv');
  if(ci) ci.addEventListener('click',function(){state.showInventory=false;state.showShop=false;render();});
  // Inventory tabs
  var tabItems=document.getElementById('inv-tab-items');
  var tabStats=document.getElementById('inv-tab-stats');
  if(tabItems) tabItems.addEventListener('click',function(){state.invTab='items';render();});
  if(tabStats) tabStats.addEventListener('click',function(){state.invTab='stats';render();});
  var os=document.getElementById('btn-open-shop');
  if(os) os.addEventListener('click',function(){generateShop('general');});
  var cs=document.getElementById('btn-close-shop');
  if(cs) cs.addEventListener('click',function(){state.showShop=false;render();});
  // Death screen
  var rb=document.getElementById('btn-respawn'),ed=document.getElementById('btn-exit-death');
  if(rb) rb.addEventListener('click',function(){respawn();});
  if(ed) ed.addEventListener('click',function(){state.deathScreen=false;state.screen='worldDetail';render();});
  // Inventory item actions
  document.querySelectorAll('.inv-equip-btn').forEach(function(b){ b.addEventListener('click',function(){ toggleEquip(parseInt(b.dataset.id)); render(); }); });
  document.querySelectorAll('.inv-use-btn').forEach(function(b){ b.addEventListener('click',function(){
    sendMessage('I use my ' + b.dataset.name + '.');
    removeItemFromInventory(parseInt(b.dataset.id));
  }); });
  document.querySelectorAll('.inv-sell-btn').forEach(function(b){ b.addEventListener('click',function(){ sellItem(parseInt(b.dataset.id)); }); });
  document.querySelectorAll('.inv-drop-btn').forEach(function(b){ b.addEventListener('click',function(){
    if(confirm('Drop this item?')) { removeItemFromInventory(parseInt(b.dataset.id)); render(); }
  }); });
  // Shop item buy
  document.querySelectorAll('.shop-buy-btn').forEach(function(b){ b.addEventListener('click',function(){
    var item = state.shopItems[parseInt(b.dataset.idx)];
    if(item) buyItem(item);
  }); });
  document.querySelectorAll('.shop-type-btn').forEach(function(b){ b.addEventListener('click',function(){ generateShop(b.dataset.type); }); });
  // Input mode toggle
  var mAct = document.getElementById('btn-mode-action');
  var mSpk = document.getElementById('btn-mode-speech');
  if(mAct) mAct.addEventListener('click', function(){ state.inputMode='action'; render(); var i=document.getElementById('play-input'); if(i)i.focus(); });
  if(mSpk) mSpk.addEventListener('click', function(){ state.inputMode='speech'; render(); var i=document.getElementById('play-input'); if(i)i.focus(); });
  if(send) send.addEventListener('click',function(){if(inp)sendMessage(inp.value);});
  if(inp) inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(inp.value);}});
  document.querySelectorAll('.action-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(state.loading) return;
      if(state.inCombat){ doCombatAction(btn.dataset.label,btn.dataset.type,btn.dataset.icon); }
      else if(btn.dataset.type==='talk'){
        if(state.npcs.length===0){ sendMessage('I look around for someone to talk to.'); }
        else if(state.npcs.length===1){ openNpcConvo(state.npcs[0]); }
        else {
          var nm=prompt('Who do you want to talk to?\n\n'+state.npcs.map(function(n,i){return (i+1)+'. '+n.name+' ('+n.attitude+')';}).join('\n')+'\n\nType a name:');
          if(nm){var f=state.npcs.find(function(n){return n.name.toLowerCase().indexOf(nm.toLowerCase())!==-1;});if(f)openNpcConvo(f);else sendMessage('I look around for someone to talk to.');}
        }
      } else if(btn.dataset.type==='shop') {
        state.showInventory = true; generateShop('general');
      } else if(btn.dataset.label==='Check inventory' || btn.dataset.type==='inventory') {
        state.showInventory = !state.showInventory; render();
      } else { sendMessage(btn.dataset.label); }
    });
  });
  document.querySelectorAll('.journal-talk-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var npc=state.npcs.find(function(n){return n.name===btn.dataset.npcName;});
      if(npc) openNpcConvo(npc);
    });
  });
  var cNpc=document.getElementById('btn-close-npc-convo');
  if(cNpc) cNpc.addEventListener('click',closeNpcConvo);
  var sNpc=document.getElementById('btn-send-npc'), npcInp=document.getElementById('npc-input');
  if(sNpc) sNpc.addEventListener('click',function(){if(npcInp){sendNpcMessage(npcInp.value);npcInp.value='';}});
  if(npcInp) npcInp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendNpcMessage(npcInp.value);npcInp.value='';}});
  document.querySelectorAll('.npc-quick-btn').forEach(function(b){b.addEventListener('click',function(){sendNpcMessage(b.dataset.q);});});
  scrollToBottom();
  // Crafting panel
  if (state.showCrafting) attachCraftingEvents();
  // Dev panel
  if (state.devMode) attachDevPanelEvents();
}

// ---- Boot ----
// ---- Boot ----
render();
</script>
</body>
</html>
